# Renamed from deploy.yml in 2026-05-04 audit refactor (Phase 5 Slice 6) — runs tests on push to main and notifies; no actual deployment occurs.
name: Test and Notify

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  GO_VERSION: "1.25"
  NODE_VERSION: "22"
  PYTHON_VERSION: "3.12"
  REGISTRY: ghcr.io/${{ github.repository_owner }}
  SOURCEBRIDGE_TEST_MODE: "true"

jobs:
  # Run tests first (gate deployment on passing tests)
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Test Go
        run: go test -race ./...

      - name: Test Python workers
        working-directory: workers
        run: |
          uv sync --dev
          # Skip @pytest.mark.slow timing-sensitive tests (e.g.,
          # test_wrapper_rate_limits_with_real_aiolimiter). Matches the
          # posture in ci.yml. Slow tests rely on real-clock measurements
          # that flake on the GitHub-hosted runner under load.
          uv run pytest -v -m "not slow"

      - name: Test Web
        working-directory: web
        run: |
          npm ci
          npm test

  notify:
    needs: test
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Report status
        run: |
          echo "Tests: ${{ needs.test.result }}"

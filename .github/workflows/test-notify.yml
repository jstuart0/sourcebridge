# Renamed from deploy.yml in 2026-05-04 audit refactor (Phase 5 Slice 6) — runs tests on push to main and notifies; no actual deployment occurs.
name: Test and Notify

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  GO_VERSION: "1.25"
  NODE_VERSION: "22"
  PYTHON_VERSION: "3.12"
  REGISTRY: ghcr.io/${{ github.repository_owner }}
  SOURCEBRIDGE_TEST_MODE: "true"

jobs:
  # Run tests first (gate deployment on passing tests)
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: ${{ env.GO_VERSION }}
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Test Go
        run: go test -race ./...

      - name: Test Python workers
        working-directory: workers
        run: |
          uv sync --dev
          # Skip @pytest.mark.slow timing-sensitive tests (e.g.,
          # test_wrapper_rate_limits_with_real_aiolimiter). Matches the
          # posture in ci.yml. Slow tests rely on real-clock measurements
          # that flake on the GitHub-hosted runner under load.
          uv run pytest -v -m "not slow"

      - name: Test Web
        working-directory: web
        run: |
          npm ci
          npm test

  notify:
    needs: test
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Report status
        run: |
          echo "Tests: ${{ needs.test.result }}"

# Renamed from deploy.yml in 2026-05-04 audit refactor (Phase 5 Slice 6) — runs tests on push to main and notifies; no actual deployment occurs.
name: Test and Notify

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  GO_VERSION: "1.25"
  NODE_VERSION: "22"
  PYTHON_VERSION: "3.12"
  REGISTRY: ghcr.io/${{ github.repository_owner }}
  SOURCEBRIDGE_TEST_MODE: "true"

jobs:
  # Run tests first (gate deployment on passing tests)
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: ${{ env.GO_VERSION }}
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4

      - name: Test Go
        run: go test -race ./...

      - name: Test Python workers
        working-directory: workers
        run: |
          uv sync --dev
          uv run pytest -v

      - name: Test Web
        working-directory: web
        run: |
          npm ci
          npm test

  notify:
    needs: test
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Report status
        run: |
          echo "Tests: ${{ needs.test.result }}"

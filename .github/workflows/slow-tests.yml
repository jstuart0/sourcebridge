name: slow-tests

on:
  schedule:
    - cron: '0 7 * * 1'  # Mondays 07:00 UTC
  workflow_dispatch: {}

env:
  PYTHON_VERSION: "3.12"

jobs:
  python-slow:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4
      - working-directory: workers
        run: uv sync --frozen
      - working-directory: workers
        run: uv run pytest -m slow --tb=short
        # Runs rate-limit tests and slow-marked integration tests.
        # Failures here do NOT block PRs; report via the workflow's status badge.

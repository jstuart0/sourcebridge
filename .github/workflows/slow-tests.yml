# CA-396: This workflow is intentionally scheduled (not triggered on every PR) and
# non-blocking. Reasons:
#   1. Slow tests (rate-limit suites, real-LLM canary, large fixture renders) routinely
#      take 5-20 minutes and would add unacceptable latency to the PR feedback loop.
#   2. Some slow tests make live LLM calls or require optional infrastructure (Ollama)
#      that isn't available in the standard CI environment.
#   3. Failures here signal environment/model regressions, not build breaks — they need
#      operator investigation, not PR blocks.
# To gate a PR on slow tests manually: trigger workflow_dispatch from the branch and
# check the result before merging.
name: slow-tests

on:
  schedule:
    - cron: '0 7 * * 1'  # Mondays 07:00 UTC
  workflow_dispatch: {}

env:
  PYTHON_VERSION: "3.12"

jobs:
  python-slow:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4
      - working-directory: workers
        run: uv sync --frozen
      - working-directory: workers
        run: uv run pytest -m slow --tb=short
        # Runs rate-limit tests and slow-marked integration tests.
        # Failures here do NOT block PRs; report via the workflow's status badge.

name: Build Images

on:
  push:
    branches:
      - main
      - dev
    tags:
      # CA-147: SemVer-shaped tags only. Excludes plugin tags
      # (sourcebridge-vscode-vX.Y.Z) emitted by release-please for
      # the plugins/vscode package — those don't ship Docker images.
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"
  pull_request:
    branches:
      - main
      - dev
  # CA-149: workflow_dispatch fallback (see oss-release.yml head comment
  # for rationale). release-please.yml dispatches this when the canonical
  # RELEASE_PLEASE_TOKEN isn't provisioned, so the SemVer-tagged image
  # build fires even with the default GITHUB_TOKEN.
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  GHCR_REGISTRY: ghcr.io
  GHCR_NAMESPACE: sourcebridge-ai
  DOCKERHUB_NAMESPACE: sourcebridge

jobs:
  # CA-136: compute the version once so all three images are labeled with
  # the SAME string. Full git history is required for `git describe` and
  # the rev-list count, so fetch-depth: 0 + fetch-tags: true. PR_NUMBER
  # is exported here so version.sh's pull_request branch never falls
  # through to the parsing fallback.
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version:    ${{ steps.compute.outputs.version }}
      commit:     ${{ steps.compute.outputs.commit }}
      build_date: ${{ steps.compute.outputs.build_date }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          fetch-tags: true
      - id: compute
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          chmod +x scripts/version.sh
          v=$(./scripts/version.sh)
          c=$(git rev-parse HEAD)
          d=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          echo "Computed version: $v"
          echo "version=$v"    >> "$GITHUB_OUTPUT"
          echo "commit=$c"     >> "$GITHUB_OUTPUT"
          echo "build_date=$d" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    # F1: api and worker use QEMU cross-compilation on ubuntu-latest (amd64).
    # web uses native per-platform runners (ubuntu-latest for amd64,
    # ubuntu-24.04-arm for arm64) to avoid the multi-hour QEMU npm/Next.js
    # build. The runner field is set per matrix entry.
    runs-on: ${{ matrix.runner }}
    # CA-139: cosign keyless OIDC signing requires id-token: write at the
    # job level. The workflow-level permissions block above (contents:read,
    # packages:write) is otherwise unchanged; this block re-asserts it
    # because per-job permissions REPLACE rather than extend the
    # workflow-level set.
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # api + worker: QEMU cross-compile, both arches in one job.
          # Completed in ~2.5min (worker) and ~17min (api) — acceptable.
          - name: api
            image: sourcebridge-api
            dockerfile: deploy/docker/Dockerfile.sourcebridge
            context: .
            edition: oss
            extra_build_args: ""
            runner: ubuntu-latest
            platforms: linux/amd64,linux/arm64
            qemu: true
            # api/worker push the full multi-arch manifest directly;
            # no platform-suffix tags needed.
            platform_suffix: ""
          - name: worker
            image: sourcebridge-worker
            dockerfile: deploy/docker/Dockerfile.worker
            context: .
            edition: oss
            extra_build_args: ""
            runner: ubuntu-latest
            platforms: linux/amd64,linux/arm64
            qemu: true
            platform_suffix: ""
          # web: split into two single-platform native builds to avoid
          # QEMU npm/Next.js timeout (>1h observed). Each job pushes a
          # platform-suffixed image (e.g. :main-amd64); the merge-web-manifest
          # job below assembles the final multi-arch manifest list.
          - name: web-amd64
            image: sourcebridge-web
            dockerfile: deploy/docker/Dockerfile.web
            context: .
            edition: oss
            extra_build_args: "NEXT_PUBLIC_EDITION=oss"
            runner: ubuntu-latest
            platforms: linux/amd64
            qemu: false
            platform_suffix: "-amd64"
          - name: web-arm64
            image: sourcebridge-web
            dockerfile: deploy/docker/Dockerfile.web
            context: .
            edition: oss
            extra_build_args: "NEXT_PUBLIC_EDITION=oss"
            runner: ubuntu-24.04-arm
            platforms: linux/arm64
            qemu: false
            platform_suffix: "-arm64"

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          fetch-tags: true

      # F1 / O-M4: QEMU is only needed for api/worker (cross-compile amd64->arm64).
      # web matrix entries build natively on their respective runners.
      - name: Set up QEMU
        if: matrix.qemu == true
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      # Detect whether Docker Hub credentials are configured on the repo.
      # Forks and PRs from external contributors will have empty secrets.
      # If absent, the workflow gracefully publishes to GHCR only and
      # skips the Docker Hub login + tags. This lets the workflow change
      # land before secrets are configured, and lets community forks run
      # CI without needing their own Docker Hub account.
      - name: Detect Docker Hub publish target
        id: dockerhub
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          if [ -n "${DOCKERHUB_USERNAME}" ] && [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
            echo "Docker Hub publish: enabled (DOCKERHUB_USERNAME present, event=${{ github.event_name }})"
          else
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "Docker Hub publish: skipped (DOCKERHUB_USERNAME absent or event=pull_request)"
          fi

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@4907a6ddec9525e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: steps.dockerhub.outputs.publish == 'true'
        uses: docker/login-action@4907a6ddec9525e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          # When Docker Hub publishing is enabled, list both registries so
          # metadata-action emits the same tag set against both — and
          # build-push-action then pushes to both in a single buildkit run.
          # When disabled, only the GHCR ref is emitted.
          images: |
            ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_NAMESPACE }}/${{ matrix.image }}
            ${{ steps.dockerhub.outputs.publish == 'true' && format('docker.io/{0}/{1}', env.DOCKERHUB_NAMESPACE, matrix.image) || '' }}
          # For web platform-split entries, append the platform suffix to every
          # tag so the per-arch images don't collide before the manifest merge.
          # For api/worker (platform_suffix=""), tags are the final tags.
          tags: |
            type=sha,prefix=sha-,format=short,suffix=${{ matrix.platform_suffix }}
            type=ref,event=branch,suffix=${{ matrix.platform_suffix }}
            type=ref,event=pr,suffix=${{ matrix.platform_suffix }}
            type=raw,value=latest${{ matrix.platform_suffix }},enable={{is_default_branch}}
            type=semver,pattern={{version}},suffix=${{ matrix.platform_suffix }}
            type=raw,value=stable${{ matrix.platform_suffix }},enable=${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-') }}
          # CA-136: pin the canonical OCI labels to the values from the
          # `prepare` job. metadata-action otherwise emits its own
          # version/revision/created based on github.ref / github.sha,
          # which would silently override the LABEL set in our Dockerfiles
          # at the registry layer (Docker labels are single-valued — the
          # last writer wins). Pinning these three keeps `docker inspect`
          # and the Dockerfile labels consistent.
          labels: |
            org.opencontainers.image.version=${{ needs.prepare.outputs.version }}
            org.opencontainers.image.revision=${{ needs.prepare.outputs.commit }}
            org.opencontainers.image.created=${{ needs.prepare.outputs.build_date }}

      - name: Build and push ${{ matrix.name }}
        # CA-139: id is required so steps.build.outputs.digest is reachable
        # by the downstream cosign-sign step. build-push-action@v6 emits
        # the manifest digest as `digest`. Signing by digest (not tag) is
        # mandatory — tags are mutable, digests aren't.
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platforms }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # CA-136: VERSION/COMMIT/BUILD_DATE/EDITION come from the
          # `prepare` job's outputs so all three images are labeled
          # with the same string. matrix.extra_build_args carries
          # any image-specific extras (e.g. NEXT_PUBLIC_EDITION for
          # the web image).
          build-args: |
            ${{ matrix.extra_build_args }}
            VERSION=${{ needs.prepare.outputs.version }}
            COMMIT=${{ needs.prepare.outputs.commit }}
            BUILD_DATE=${{ needs.prepare.outputs.build_date }}
            EDITION=${{ matrix.edition }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

      # CA-139: Sigstore cosign keyless OIDC signing.
      #
      # The signature lives next to the image in the registry (cosign
      # uses a derived tag like sha256-<digest>.sig). Sigstore Fulcio
      # issues an ephemeral cert tied to the GHA OIDC identity; Rekor
      # records the signature in its public transparency log.
      #
      # Pinned by SHA so a malicious or accidental v4 retag can't change
      # what runs in our pipeline. Keep the human-readable tag in the comment
      # so future bumps are deliberate rather than mechanical.
      #
      # web-amd64 and web-arm64 are signed here (per platform-arch image);
      # the merged web manifest is signed separately in merge-web-manifest.
      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      # Sign the GHCR image we just pushed. cosign sign --yes skips the
      # interactive Y/N prompt that would otherwise hang in CI.
      - name: Sign GHCR image (keyless)
        if: github.event_name != 'pull_request'
        run: |
          cosign sign --yes \
            "${GHCR_REGISTRY}/${GHCR_NAMESPACE}/${IMAGE}@${DIGEST}"
        env:
          GHCR_REGISTRY: ${{ env.GHCR_REGISTRY }}
          GHCR_NAMESPACE: ${{ env.GHCR_NAMESPACE }}
          IMAGE: ${{ matrix.image }}
          DIGEST: ${{ steps.build.outputs.digest }}

      # Sign the Docker Hub image too if dual-publish is enabled.
      # Reuses the same Fulcio cert / Rekor entry — cosign creates a
      # second signature manifest at the new registry.
      - name: Sign Docker Hub image (keyless)
        if: steps.dockerhub.outputs.publish == 'true'
        run: |
          cosign sign --yes \
            "${DOCKERHUB_NAMESPACE}/${IMAGE}@${DIGEST}"
        env:
          DOCKERHUB_NAMESPACE: ${{ env.DOCKERHUB_NAMESPACE }}
          IMAGE: ${{ matrix.image }}
          DIGEST: ${{ steps.build.outputs.digest }}

  # F1 follow-up: merge the web-amd64 and web-arm64 single-platform images
  # into a proper multi-arch manifest list. Runs after ALL build matrix jobs
  # complete so both platform-suffixed images exist in the registry.
  #
  # This job assembles one manifest per tag variant by combining:
  #   sourcebridge-web:<tag>-amd64  +  sourcebridge-web:<tag>-arm64
  #   ->  sourcebridge-web:<tag>   (linux/amd64 + linux/arm64)
  #
  # api and worker are not handled here — they push a complete multi-arch
  # manifest directly from their single QEMU matrix job.
  merge-web-manifest:
    needs: [prepare, build]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Detect Docker Hub publish target
        id: dockerhub
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          if [ -n "${DOCKERHUB_USERNAME}" ]; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "publish=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9525e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: steps.dockerhub.outputs.publish == 'true'
        uses: docker/login-action@4907a6ddec9525e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Compute the same tag set that the build jobs used, so we can map
      # platform-suffixed -> final manifest tags consistently.
      - name: Create multi-arch web manifest
        env:
          GHCR_IMAGE: ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_NAMESPACE }}/sourcebridge-web
          DH_IMAGE: docker.io/${{ env.DOCKERHUB_NAMESPACE }}/sourcebridge-web
          DH_PUBLISH: ${{ steps.dockerhub.outputs.publish }}
          GITHUB_REF: ${{ github.ref }}
          GITHUB_SHA: ${{ github.sha }}
          VERSION: ${{ needs.prepare.outputs.version }}
          EVENT: ${{ github.event_name }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          HEAD_BRANCH: ${{ github.ref_name }}
        run: |
          SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)
          IS_TAG=false
          IS_STABLE=false
          IS_DEFAULT=false
          [[ "${GITHUB_REF}" == refs/tags/v* ]] && IS_TAG=true
          [[ "${IS_TAG}" == "true" && "${GITHUB_REF}" != *-* ]] && IS_STABLE=true
          [[ "${HEAD_BRANCH}" == "${DEFAULT_BRANCH}" ]] && IS_DEFAULT=true

          TAGS="sha-${SHORT_SHA} ${HEAD_BRANCH}"
          if [ "${IS_DEFAULT}" == "true" ]; then
            TAGS="${TAGS} latest"
          fi
          if [ "${IS_TAG}" == "true" ]; then
            TAGS="${TAGS} ${VERSION}"
          fi
          if [ "${IS_STABLE}" == "true" ]; then
            TAGS="${TAGS} stable"
          fi

          echo "Tags to merge: ${TAGS}"

          for tag in ${TAGS}; do
            ghcr_amd64="${GHCR_IMAGE}:${tag}-amd64"
            ghcr_arm64="${GHCR_IMAGE}:${tag}-arm64"
            ghcr_dst="${GHCR_IMAGE}:${tag}"
            echo "Merging ${ghcr_amd64} + ${ghcr_arm64} -> ${ghcr_dst}"
            docker buildx imagetools create -t "${ghcr_dst}" "${ghcr_amd64}" "${ghcr_arm64}"
            if [ "${DH_PUBLISH}" == "true" ]; then
              dh_amd64="${DH_IMAGE}:${tag}-amd64"
              dh_arm64="${DH_IMAGE}:${tag}-arm64"
              dh_dst="${DH_IMAGE}:${tag}"
              echo "Merging ${dh_amd64} + ${dh_arm64} -> ${dh_dst}"
              docker buildx imagetools create -t "${dh_dst}" "${dh_amd64}" "${dh_arm64}"
            fi
          done

      # Sign the final merged GHCR manifest by digest.
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign merged GHCR web manifest (keyless)
        env:
          GHCR_IMAGE: ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_NAMESPACE }}/sourcebridge-web
          GITHUB_SHA: ${{ github.sha }}
          HEAD_BRANCH: ${{ github.ref_name }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          # Sign the branch tag (stable reference for the merged manifest)
          REF_TAG="${HEAD_BRANCH}"
          DIGEST=$(docker buildx imagetools inspect "${GHCR_IMAGE}:${REF_TAG}" --format '{{.Manifest.Digest}}')
          echo "Signing ${GHCR_IMAGE}@${DIGEST}"
          cosign sign --yes "${GHCR_IMAGE}@${DIGEST}"

      - name: Sign merged Docker Hub web manifest (keyless)
        if: steps.dockerhub.outputs.publish == 'true'
        env:
          DH_IMAGE: docker.io/${{ env.DOCKERHUB_NAMESPACE }}/sourcebridge-web
          HEAD_BRANCH: ${{ github.ref_name }}
        run: |
          REF_TAG="${HEAD_BRANCH}"
          DIGEST=$(docker buildx imagetools inspect "${DH_IMAGE}:${REF_TAG}" --format '{{.Manifest.Digest}}')
          echo "Signing ${DH_IMAGE}@${DIGEST}"
          cosign sign --yes "${DH_IMAGE}@${DIGEST}"

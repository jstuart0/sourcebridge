name: Build Images

on:
  push:
    branches:
      - main
      - dev
    tags:
      - "v*"
  pull_request:
    branches:
      - main
      - dev

permissions:
  contents: read
  packages: write

env:
  GHCR_REGISTRY: ghcr.io
  GHCR_NAMESPACE: sourcebridge-ai
  DOCKERHUB_NAMESPACE: sourcebridge

jobs:
  # CA-136: compute the version once so all three images are labeled with
  # the SAME string. Full git history is required for `git describe` and
  # the rev-list count, so fetch-depth: 0 + fetch-tags: true. PR_NUMBER
  # is exported here so version.sh's pull_request branch never falls
  # through to the parsing fallback.
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version:    ${{ steps.compute.outputs.version }}
      commit:     ${{ steps.compute.outputs.commit }}
      build_date: ${{ steps.compute.outputs.build_date }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      - id: compute
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          chmod +x scripts/version.sh
          v=$(./scripts/version.sh)
          c=$(git rev-parse HEAD)
          d=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          echo "Computed version: $v"
          echo "version=$v"    >> "$GITHUB_OUTPUT"
          echo "commit=$c"     >> "$GITHUB_OUTPUT"
          echo "build_date=$d" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api
            image: sourcebridge-api
            dockerfile: deploy/docker/Dockerfile.sourcebridge
            context: .
            edition: oss
            extra_build_args: ""
          - name: worker
            image: sourcebridge-worker
            dockerfile: deploy/docker/Dockerfile.worker
            context: .
            edition: oss
            extra_build_args: ""
          - name: web
            image: sourcebridge-web
            dockerfile: deploy/docker/Dockerfile.web
            context: .
            edition: oss
            extra_build_args: "NEXT_PUBLIC_EDITION=oss"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Detect whether Docker Hub credentials are configured on the repo.
      # Forks and PRs from external contributors will have empty secrets.
      # If absent, the workflow gracefully publishes to GHCR only and
      # skips the Docker Hub login + tags. This lets the workflow change
      # land before secrets are configured, and lets community forks run
      # CI without needing their own Docker Hub account.
      - name: Detect Docker Hub publish target
        id: dockerhub
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          if [ -n "${DOCKERHUB_USERNAME}" ] && [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
            echo "Docker Hub publish: enabled (DOCKERHUB_USERNAME present, event=${{ github.event_name }})"
          else
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "Docker Hub publish: skipped (DOCKERHUB_USERNAME absent or event=pull_request)"
          fi

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: steps.dockerhub.outputs.publish == 'true'
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          # When Docker Hub publishing is enabled, list both registries so
          # metadata-action emits the same tag set against both — and
          # build-push-action then pushes to both in a single buildkit run.
          # When disabled, only the GHCR ref is emitted.
          images: |
            ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_NAMESPACE }}/${{ matrix.image }}
            ${{ steps.dockerhub.outputs.publish == 'true' && format('docker.io/{0}/{1}', env.DOCKERHUB_NAMESPACE, matrix.image) || '' }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=ref,event=pr
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=raw,value=stable,enable=${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-') }}

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # CA-136: VERSION/COMMIT/BUILD_DATE/EDITION come from the
          # `prepare` job's outputs so all three images are labeled
          # with the same string. matrix.extra_build_args carries
          # any image-specific extras (e.g. NEXT_PUBLIC_EDITION for
          # the web image).
          build-args: |
            ${{ matrix.extra_build_args }}
            VERSION=${{ needs.prepare.outputs.version }}
            COMMIT=${{ needs.prepare.outputs.commit }}
            BUILD_DATE=${{ needs.prepare.outputs.build_date }}
            EDITION=${{ matrix.edition }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

name: OSS Release

on:
  push:
    tags:
      # CA-147: SemVer-shaped tags only. Excludes plugin tags
      # (sourcebridge-vscode-vX.Y.Z) emitted by release-please for
      # the plugins/vscode package. The plugin has its own marketplace
      # cadence and shouldn't fire the OSS binary build.
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"
  # CA-149: workflow_dispatch as a fallback so release-please.yml can
  # explicitly dispatch this workflow when RELEASE_PLEASE_TOKEN isn't
  # provisioned (the default GITHUB_TOKEN suppresses workflow-on-workflow
  # tag triggers; workflow_dispatch is exempt from that recursion guard).
  # Also useful for manually re-running a release build without re-tagging.
  # Run via: `gh workflow run oss-release.yml --ref vX.Y.Z[-suffix]`.
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  # Match go.mod (1.25.0). The previous 1.24 setting relied on the
  # toolchain auto-download which produced subtly different builds.
  GO_VERSION: "1.25"

jobs:
  build-binaries:
    # Each arch runs natively on its own runner. Cross-compiling with
    # CGO_ENABLED=1 from amd64 → arm64 on ubuntu-latest fails because
    # Go hands the arm64 assembly in tree-sitter's C deps to the host
    # x86 assembler (`stp x25, x26, [sp,...]: no such instruction`).
    # v0.7.0's release workflow hit this. Native runners sidestep it.
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
          - goos: linux
            goarch: arm64
            runner: ubuntu-24.04-arm
          - goos: darwin
            goarch: amd64
            runner: macos-13
          - goos: darwin
            goarch: arm64
            runner: macos-14
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          # CA-136: full history so the binary's BuildDate / commit can
          # be derived consistently with the release tag.
          fetch-depth: 0
          fetch-tags: true
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "1"
        run: |
          BINARY_NAME=sourcebridge
          if [ "${{ matrix.goos }}" = "windows" ]; then
            BINARY_NAME=sourcebridge.exe
          fi
          # CA-136: ldflags now target internal/version.* (the single
          # source of truth across the CLI flag, GraphQL Query.version,
          # REST /api/v1/admin/status, REST /api/v1/version, and the
          # telemetry ping). The previous -X main.version=... pointed
          # at a since-removed symbol and was a silent no-op.
          BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          go build -ldflags="-s -w \
            -X github.com/sourcebridge/sourcebridge/internal/version.Version=${{ github.ref_name }} \
            -X github.com/sourcebridge/sourcebridge/internal/version.Commit=${{ github.sha }} \
            -X github.com/sourcebridge/sourcebridge/internal/version.BuildDate=${BUILD_DATE} \
            -X github.com/sourcebridge/sourcebridge/internal/version.Edition=oss" \
            -o dist/${BINARY_NAME} ./cmd/sourcebridge
      - name: Package
        run: |
          cd dist
          ARCHIVE_NAME=sourcebridge-${{ github.ref_name }}-${{ matrix.goos }}-${{ matrix.goarch }}
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip ${ARCHIVE_NAME}.zip sourcebridge.exe
          else
            tar czf ${ARCHIVE_NAME}.tar.gz sourcebridge
          fi
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: binary-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*.tar.gz
          if-no-files-found: ignore
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: binary-${{ matrix.goos }}-${{ matrix.goarch }}-zip
          path: dist/*.zip
          if-no-files-found: ignore

  build-docker:
    runs-on: ubuntu-latest
    # CA-139: cosign keyless OIDC signing requires id-token: write at the
    # job level. Workflow-level permissions (contents:write, packages:write)
    # are REPLACED by the per-job block, so re-list packages:write here. The
    # `release` job further down keeps contents:write on its own.
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          # CA-136: full history for any in-image tooling that walks git.
          fetch-depth: 0
          fetch-tags: true
      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        run: |
          echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
      - id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: deploy/docker/Dockerfile.sourcebridge
          push: true
          tags: ghcr.io/${{ github.repository }}/sourcebridge:${{ github.ref_name }}
          # CA-136: bake the release tag into ldflags + OCI labels.
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ steps.meta.outputs.build_date }}
            EDITION=oss
      # CA-139: sign the tagged release image. Note that build-images.yml
      # also fires on tagged pushes and signs the three component images
      # (sourcebridge-{api,web,worker}) — this workflow signs the separate
      # combined image at ghcr.io/<owner>/<repo>/sourcebridge:<tag>. The
      # verification regex in docs/admin/build-info.md trusts both
      # workflow identities.
      - name: Install cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1 (cosign v3.0.5)
      - name: Sign release image (keyless)
        run: |
          cosign sign --yes \
            "ghcr.io/${REPO}/sourcebridge@${DIGEST}"
        env:
          REPO: ${{ github.repository }}
          DIGEST: ${{ steps.build.outputs.digest }}

  release:
    needs: [build-binaries, build-docker]
    runs-on: ubuntu-latest
    steps:
      # Only download the binary-archive artifacts. docker/build-push-action
      # publishes a `*.dockerbuild` provenance artifact alongside the image
      # push; that artifact is sometimes slow to finalize in the artifacts
      # API and causes the release job to fail with "Artifact download
      # failed after 5 retries" even though the Docker image pushed fine.
      # We don't need the provenance blob for the GitHub release anyway —
      # only the tarballs end up attached to the release page.
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: binary-*
          merge-multiple: true
          path: artifacts
      - name: Compute SHA256SUMS
        # Produces a SHA256SUMS file alongside the per-arch tarballs so
        # the install.sh installer can do best-effort integrity verification.
        # See docs/user/installation.md#trust-model for the trust contract
        # (integrity, not authenticity — sigstore/cosign is future work).
        run: |
          cd artifacts
          shasum -a 256 ./*.tar.gz | sed 's| \./| |' > SHA256SUMS
          echo "--- SHA256SUMS ---"
          cat SHA256SUMS
      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          files: artifacts/*
          # CA-147: release-please owns the release notes / changelog
          # text now. Setting this to false avoids release-please's
          # PR body and the auto-generated notes fighting for the
          # same release body. release-please writes the release
          # body when it merges its PR; this step then UPDATES the
          # release with the binary assets without clobbering it.
          generate_release_notes: false
          # SemVer prerelease tags contain a `-` (e.g. v0.8.0-rc.1,
          # v0.8.0-beta.2, v1.0.0-alpha). softprops/action-gh-release
          # doesn't auto-detect from the tag name, so we flag
          # prerelease explicitly when the ref has a hyphen.
          prerelease: ${{ contains(github.ref_name, '-') }}

  tap-update:
    # Update the Homebrew tap formula after the release assets are published.
    # If this job fails the binaries are already on the Releases page — the
    # main release is NOT rolled back. Fix the deploy key or tap repo and
    # re-run this job from the Actions UI.
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Check deploy key secret
        run: |
          if [ -z "${{ secrets.HOMEBREW_TAP_DEPLOY_KEY }}" ]; then
            echo "ERROR: HOMEBREW_TAP_DEPLOY_KEY secret is not set."
            echo "Set it up following _homebrew-tap-bootstrap/SETUP.md before cutting a release."
            exit 1
          fi

      - name: Compute version (strip leading v)
        id: version
        run: echo "ver=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download release archives
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --pattern "*.tar.gz" \
            --dir release-assets

      - name: Compute SHA256 checksums
        id: sha
        run: |
          cd release-assets
          darwin_arm64_sha=$(shasum -a 256 "sourcebridge-${{ github.ref_name }}-darwin-arm64.tar.gz" | awk '{print $1}')
          darwin_amd64_sha=$(shasum -a 256 "sourcebridge-${{ github.ref_name }}-darwin-amd64.tar.gz" | awk '{print $1}')
          linux_arm64_sha=$(shasum -a 256  "sourcebridge-${{ github.ref_name }}-linux-arm64.tar.gz"  | awk '{print $1}')
          linux_amd64_sha=$(shasum -a 256  "sourcebridge-${{ github.ref_name }}-linux-amd64.tar.gz"  | awk '{print $1}')
          echo "darwin_arm64=$darwin_arm64_sha" >> "$GITHUB_OUTPUT"
          echo "darwin_amd64=$darwin_amd64_sha" >> "$GITHUB_OUTPUT"
          echo "linux_arm64=$linux_arm64_sha"   >> "$GITHUB_OUTPUT"
          echo "linux_amd64=$linux_amd64_sha"   >> "$GITHUB_OUTPUT"

      - name: Render Formula
        env:
          VERSION: ${{ steps.version.outputs.ver }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
          DARWIN_ARM64_SHA: ${{ steps.sha.outputs.darwin_arm64 }}
          DARWIN_AMD64_SHA: ${{ steps.sha.outputs.darwin_amd64 }}
          LINUX_ARM64_SHA: ${{ steps.sha.outputs.linux_arm64 }}
          LINUX_AMD64_SHA: ${{ steps.sha.outputs.linux_amd64 }}
        run: |
          mkdir -p Formula
          cat > Formula/sourcebridge.rb <<'FORMULA'
          class Sourcebridge < Formula
            desc "Requirement-aware code comprehension platform"
            homepage "https://sourcebridge.ai"
            version "VERSION_PLACEHOLDER"
            license "AGPL-3.0-only"

            on_macos do
              on_arm do
                url "https://github.com/REPO_PLACEHOLDER/releases/download/TAG_PLACEHOLDER/sourcebridge-TAG_PLACEHOLDER-darwin-arm64.tar.gz"
                sha256 "DARWIN_ARM64_SHA_PLACEHOLDER"
              end
              on_intel do
                url "https://github.com/REPO_PLACEHOLDER/releases/download/TAG_PLACEHOLDER/sourcebridge-TAG_PLACEHOLDER-darwin-amd64.tar.gz"
                sha256 "DARWIN_AMD64_SHA_PLACEHOLDER"
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/REPO_PLACEHOLDER/releases/download/TAG_PLACEHOLDER/sourcebridge-TAG_PLACEHOLDER-linux-arm64.tar.gz"
                sha256 "LINUX_ARM64_SHA_PLACEHOLDER"
              end
              on_intel do
                url "https://github.com/REPO_PLACEHOLDER/releases/download/TAG_PLACEHOLDER/sourcebridge-TAG_PLACEHOLDER-linux-amd64.tar.gz"
                sha256 "LINUX_AMD64_SHA_PLACEHOLDER"
              end
            end

            def install
              bin.install "sourcebridge"
            end

            test do
              assert_match "sourcebridge", shell_output("#{bin}/sourcebridge --help")
            end
          end
          FORMULA

          # Substitute placeholders (avoid envsubst to keep the heredoc portable)
          sed -i \
            -e "s|VERSION_PLACEHOLDER|${VERSION}|g" \
            -e "s|REPO_PLACEHOLDER|${REPO}|g" \
            -e "s|TAG_PLACEHOLDER|${TAG}|g" \
            -e "s|DARWIN_ARM64_SHA_PLACEHOLDER|${DARWIN_ARM64_SHA}|g" \
            -e "s|DARWIN_AMD64_SHA_PLACEHOLDER|${DARWIN_AMD64_SHA}|g" \
            -e "s|LINUX_ARM64_SHA_PLACEHOLDER|${LINUX_ARM64_SHA}|g" \
            -e "s|LINUX_AMD64_SHA_PLACEHOLDER|${LINUX_AMD64_SHA}|g" \
            Formula/sourcebridge.rb

      - name: Validate Formula syntax
        run: ruby -c Formula/sourcebridge.rb

      - name: Push to tap repo
        env:
          HOMEBREW_TAP_DEPLOY_KEY: ${{ secrets.HOMEBREW_TAP_DEPLOY_KEY }}
        run: |
          # Configure SSH with the deploy key and a pinned GitHub host key.
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${HOMEBREW_TAP_DEPLOY_KEY}" > ~/.ssh/tap_deploy_key
          chmod 600 ~/.ssh/tap_deploy_key

          # Pin GitHub's published ECDSA host key.
          # Source: https://docs.github.com/en/authentication/keeping-your-account-and-data-secure/githubs-ssh-key-fingerprints
          # SHA256:p2QAMXNIC1TJYWeIOttrVc98/R1BUFWu3/LiyKgUfQM
          printf '%s\n' 'github.com ecdsa-sha2-nistp256 AAAAE2VjZHNhLXNoYTItbmlzdHAyNTYAAAAIbmlzdHAyNTYAAABBBEmKSENjQEezOmxkZMy7opKgwFB9nkt5YRrYMjNuG5N87uRgg6CLrbo5wAdT/y6v0mKV0U2w0WZ2YB/++Tpockg=' > ~/.ssh/tap_known_hosts
          chmod 600 ~/.ssh/tap_known_hosts

          printf '%s\n' \
            'Host github-tap' \
            '  HostName github.com' \
            '  User git' \
            '  IdentityFile ~/.ssh/tap_deploy_key' \
            '  IdentitiesOnly yes' \
            '  UserKnownHostsFile ~/.ssh/tap_known_hosts' \
            '  StrictHostKeyChecking yes' \
            '  HostKeyAlgorithms ecdsa-sha2-nistp256' >> ~/.ssh/config
          chmod 600 ~/.ssh/config

          # Clone the tap repo
          git clone git@github-tap:sourcebridge-ai/homebrew-tap.git tap-repo
          mkdir -p tap-repo/Formula
          cp Formula/sourcebridge.rb tap-repo/Formula/sourcebridge.rb

          cd tap-repo
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/sourcebridge.rb
          git diff --cached --quiet && echo "Formula unchanged — skipping commit" && exit 0
          git commit -m "update sourcebridge to ${{ github.ref_name }}"
          git push

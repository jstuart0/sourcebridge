# SourceBridge — Docker Hub Images
#
# Use this file to run SourceBridge from pre-built images (no git clone needed).
#
# Quick start:
#   curl -O https://raw.githubusercontent.com/sourcebridge-ai/sourcebridge/main/docker-compose.hub.yml
#   docker compose -f docker-compose.hub.yml up -d
#
# With a cloud LLM provider:
#   SOURCEBRIDGE_LLM_PROVIDER=anthropic \
#   SOURCEBRIDGE_LLM_API_KEY=sk-ant-... \
#   SOURCEBRIDGE_LLM_MODEL=claude-sonnet-4-20250514 \
#   docker compose -f docker-compose.hub.yml up -d
#
# Default: Ollama (local inference, no API key needed).
#   Install Ollama first: https://ollama.com
#   Pull a model: ollama pull qwen3:32b

services:
  # Pre-create the RocksDB directory and chown the named volume to the
  # non-root user the SurrealDB image runs as (UID 65532). Without this,
  # the first `up` fails with "Failed to create RocksDB directory:
  # PermissionDenied" because Docker creates fresh named volumes as root.
  surrealdb-init:
    image: alpine:3.20
    command:
      - /bin/sh
      - -lc
      - mkdir -p /data/database.db && chown -R 65532:65532 /data
    volumes:
      - surrealdb-data:/data
    restart: "no"

  # Generate a per-install encryption key on first boot and persist it in a
  # named volume. Subsequent `up` calls reuse the same key (idempotent).
  # `down -v` deletes the volume → a new key is generated on the next `up`
  # (this also wipes all encrypted secrets; see docs/admin/llm-config.md
  # §"Wipe-and-re-enter (destructive cleanup)").
  #
  # The API container mounts the same volume read-only at
  # /run/sourcebridge/secrets and reads the key via
  # SOURCEBRIDGE_SECURITY_ENCRYPTION_KEY_FILE. This follows the *_FILE
  # convention used by Postgres and Vault (files are higher-trust than env
  # vars because env vars leak via docker inspect and /proc).
  encryption-key-init:
    image: alpine:3.20
    command:
      - /bin/sh
      - -lc
      - |
        if [ ! -f /secrets/encryption_key ]; then
          head -c 32 /dev/urandom | od -An -tx1 | tr -d ' \n' > /secrets/encryption_key
          echo "encryption-key-init: generated new encryption key"
        else
          echo "encryption-key-init: encryption key already exists, skipping"
        fi
        # Allow the API user (UID 1000) to read the key. The file is
        # in a named volume only accessible within the compose network.
        chown 1000:1000 /secrets/encryption_key
        chmod 600 /secrets/encryption_key
    volumes:
      - sourcebridge-secrets:/secrets
    restart: "no"

  surrealdb:
    image: surrealdb/surrealdb:v2.6.5
    command: start --user ${SURREAL_USER:-root} --pass ${SURREAL_PASS:-INSECURE-DEFAULT-CHANGE-ME-NOW} --log info file:/data/database.db
    volumes:
      - surrealdb-data:/data
    depends_on:
      surrealdb-init:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/surreal", "is-ready", "--endpoint", "ws://localhost:8000"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  sourcebridge:
    image: sourcebridge/sourcebridge-api:latest
    ports:
      - "${SOURCEBRIDGE_API_PORT:-8080}:8080"
    environment:
      - SOURCEBRIDGE_STORAGE_SURREAL_MODE=external
      - SOURCEBRIDGE_STORAGE_SURREAL_URL=ws://surrealdb:8000/rpc
      - SOURCEBRIDGE_STORAGE_SURREAL_NAMESPACE=sourcebridge
      - SOURCEBRIDGE_STORAGE_SURREAL_DATABASE=sourcebridge
      - SOURCEBRIDGE_STORAGE_SURREAL_USER=${SURREAL_USER:-root}
      - SOURCEBRIDGE_STORAGE_SURREAL_PASS=${SURREAL_PASS:-INSECURE-DEFAULT-CHANGE-ME-NOW}
      - SOURCEBRIDGE_STORAGE_REDIS_MODE=memory
      # Repo cache: /data is owned by the 'sourcebr' user (UID 1000) inside the
      # API container. Without this, the default './repo-cache' resolves to
      # /repo-cache (root-owned) and every addRepository call fails with
      # "permission denied" before the git clone even starts.
      # Note: /data/repo-cache lives inside the container filesystem and is NOT
      # persisted across container restarts by default. The cache is fully
      # rebuildable from git, so this is acceptable. If you want crash-safe
      # caching, add a named volume mount for /data/repo-cache.
      - SOURCEBRIDGE_STORAGE_REPO_CACHE_PATH=/data/repo-cache
      - SOURCEBRIDGE_WORKER_ADDRESS=worker:50051
      - SOURCEBRIDGE_SECURITY_GRPC_AUTH_SECRET=${SOURCEBRIDGE_GRPC_SECRET:-INSECURE-DEFAULT-CHANGE-ME-NOW}
      # CA-311: 64-hex placeholder is syntactically valid (32 raw bytes; passes
      # the >=32-byte length gate added in r2) but is publicly known. Override
      # with SOURCEBRIDGE_JWT_SECRET=$(openssl rand -hex 32) in .env for any
      # non-throwaway use. WarnInsecureDefaults still flags this placeholder
      # so operators see a startup banner until they replace it.
      - SOURCEBRIDGE_SECURITY_JWT_SECRET=${SOURCEBRIDGE_JWT_SECRET:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
      # r1 Phase 2: read encryption key from the init-container-generated file.
      # The *_FILE convention follows Postgres / Vault (higher-trust than literal
      # env vars, which leak via docker inspect and /proc/<pid>/environ).
      - SOURCEBRIDGE_SECURITY_ENCRYPTION_KEY_FILE=/run/sourcebridge/secrets/encryption_key
    volumes:
      - sourcebridge-secrets:/run/sourcebridge/secrets:ro
    depends_on:
      surrealdb:
        condition: service_healthy
      encryption-key-init:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  worker:
    image: sourcebridge/sourcebridge-worker:latest
    environment:
      - SOURCEBRIDGE_WORKER_GRPC_PORT=50051
      - SOURCEBRIDGE_WORKER_SURREAL_URL=ws://surrealdb:8000/rpc
      - SOURCEBRIDGE_WORKER_SURREAL_NAMESPACE=sourcebridge
      - SOURCEBRIDGE_WORKER_SURREAL_DATABASE=sourcebridge
      - SOURCEBRIDGE_WORKER_SURREAL_USER=${SURREAL_USER:-root}
      - SOURCEBRIDGE_WORKER_SURREAL_PASS=${SURREAL_PASS:-INSECURE-DEFAULT-CHANGE-ME-NOW}
      - SOURCEBRIDGE_WORKER_GRPC_AUTH_SECRET=${SOURCEBRIDGE_GRPC_SECRET:-INSECURE-DEFAULT-CHANGE-ME-NOW}
      - SOURCEBRIDGE_WORKER_LLM_PROVIDER=${SOURCEBRIDGE_LLM_PROVIDER:-ollama}
      - SOURCEBRIDGE_WORKER_LLM_BASE_URL=${SOURCEBRIDGE_LLM_BASE_URL:-http://host.docker.internal:11434/v1}
      - SOURCEBRIDGE_WORKER_LLM_MODEL=${SOURCEBRIDGE_LLM_MODEL:-qwen3:32b}
      - SOURCEBRIDGE_WORKER_LLM_API_KEY=${SOURCEBRIDGE_LLM_API_KEY:-not-needed}
      - SOURCEBRIDGE_WORKER_EMBEDDING_PROVIDER=${SOURCEBRIDGE_EMBEDDING_PROVIDER:-ollama}
      - SOURCEBRIDGE_WORKER_EMBEDDING_BASE_URL=${SOURCEBRIDGE_EMBEDDING_BASE_URL:-${SOURCEBRIDGE_LLM_BASE_URL:-http://host.docker.internal:11434}}
      # SEC-11: enable gRPC reflection in dev so grpcurl / grpc-ui work locally.
      # Production deployments leave this unset → reflection is off.
      # CA-317: hub deploy default false (production-shaped); operator can
      # opt in to verbose logging via SOURCEBRIDGE_WORKER_DEBUG=true in .env.
      # Was hardcoded true — that left every Docker-Hub install logging at
      # debug verbosity by default with no way to opt out.
      - SOURCEBRIDGE_WORKER_DEBUG=${SOURCEBRIDGE_WORKER_DEBUG:-false}
    depends_on:
      surrealdb:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/usr/local/bin/grpc_health_probe", "-addr=localhost:50051"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  web:
    image: sourcebridge/sourcebridge-web:latest
    ports:
      - "${SOURCEBRIDGE_WEB_PORT:-3000}:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://sourcebridge:8080
      - SOURCEBRIDGE_WEB_DEV_PROXY=http://sourcebridge:8080
    depends_on:
      sourcebridge:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s

volumes:
  surrealdb-data:
  # Named volume for the per-install encryption key generated by
  # encryption-key-init. Back this up before any restore — losing it loses
  # every encrypted LLM API key and git token stored in the database.
  # See docs/admin/llm-config.md §"Wipe-and-re-enter (destructive cleanup)".
  sourcebridge-secrets:

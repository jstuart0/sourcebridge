apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Opt-in NetworkPolicy hardening overlay.
# This overlay adds a default-deny posture plus an explicit allow-set for
# all sourcebridge pods. The base manifest is NOT modified.
#
# Apply:  kubectl apply -k deploy/kubernetes/overlays/network-policy-hardened/
# Remove: kubectl delete -k deploy/kubernetes/overlays/network-policy-hardened/
#
# See README.md in this directory before applying to production.

namespace: sourcebridge

resources:
  - ../../base
  - default-deny.yaml
  - allow-set.yaml

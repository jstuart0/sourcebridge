# Default-deny for all pods in the sourcebridge namespace.
# Selecting an empty podSelector {} matches ALL pods.
# Both Ingress and Egress are denied by default; the allow-set.yaml
# policies carve out the specific flows each component needs.
#
# WARNING: applying this without also applying allow-set.yaml will
# break all inter-pod and external traffic immediately.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: sourcebridge
  labels:
    app.kubernetes.io/part-of: sourcebridge
    app.kubernetes.io/component: network-policy
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sourcebridge-repo-cache
  namespace: sourcebridge
  labels:
    app.kubernetes.io/name: sourcebridge-api
    app.kubernetes.io/part-of: sourcebridge
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: nfs
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sourcebridge-api
  namespace: sourcebridge
  labels:
    app.kubernetes.io/name: sourcebridge-api
    app.kubernetes.io/part-of: sourcebridge
    app.kubernetes.io/component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: sourcebridge-api
      app.kubernetes.io/part-of: sourcebridge
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sourcebridge-api
        app.kubernetes.io/part-of: sourcebridge
        app.kubernetes.io/component: api
    spec:
      containers:
        - name: sourcebridge-api
          image: ghcr.io/sourcebridge/sourcebridge-api:latest
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          envFrom:
            - configMapRef:
                name: sourcebridge-config
            - secretRef:
                name: sourcebridge-secrets
          volumeMounts:
            - name: repo-cache
              mountPath: /data/repo-cache
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1"
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
      volumes:
        - name: repo-cache
          persistentVolumeClaim:
            claimName: sourcebridge-repo-cache
---
apiVersion: v1
kind: Service
metadata:
  name: sourcebridge-api
  namespace: sourcebridge
  labels:
    app.kubernetes.io/name: sourcebridge-api
    app.kubernetes.io/part-of: sourcebridge
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: sourcebridge-api
    app.kubernetes.io/part-of: sourcebridge
  ports:
    - port: 8080
      targetPort: http
      protocol: TCP
      name: http

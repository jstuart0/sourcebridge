apiVersion: apps/v1
kind: Deployment
metadata:
  name: sourcebridge-web
  namespace: sourcebridge
  labels:
    app.kubernetes.io/name: sourcebridge-web
    app.kubernetes.io/part-of: sourcebridge
    app.kubernetes.io/component: web
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: sourcebridge-web
      app.kubernetes.io/part-of: sourcebridge
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sourcebridge-web
        app.kubernetes.io/part-of: sourcebridge
        app.kubernetes.io/component: web
    spec:
      containers:
        - name: sourcebridge-web
          image: ghcr.io/sourcebridge/sourcebridge-web:latest
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "https://sourcebridge.example.com"
          ports:
            - containerPort: 3000
              name: http
              protocol: TCP
          resources:
            requests:
              memory: "128Mi"
              cpu: "125m"
            limits:
              memory: "256Mi"
              cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: sourcebridge-web
  namespace: sourcebridge
  labels:
    app.kubernetes.io/name: sourcebridge-web
    app.kubernetes.io/part-of: sourcebridge
    app.kubernetes.io/component: web
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: sourcebridge-web
    app.kubernetes.io/part-of: sourcebridge
  ports:
    - port: 3000
      targetPort: http
      protocol: TCP
      name: http

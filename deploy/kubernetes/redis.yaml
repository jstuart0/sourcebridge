apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: sourcebridge
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: sourcebridge
    app.kubernetes.io/component: cache
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: redis
      app.kubernetes.io/part-of: sourcebridge
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redis
        app.kubernetes.io/part-of: sourcebridge
        app.kubernetes.io/component: cache
    spec:
      # CA-471 / O-M1: pod-level securityContext matching Helm CA-348 hardening.
      # redis:7.4-alpine runs as UID/GID 999/999 (same as Helm).
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
      containers:
        - name: redis
          # CA-471 / O-M1: pin to 7.4-alpine (matches Helm values.yaml:278 CA-356).
          # Floating :7-alpine silently pulled new minor+patch versions on node restart.
          image: redis:7.4-alpine
          args:
            # MCP sessions are ephemeral; we don't need RDB/AOF persistence
            # to survive a Redis restart — the client will just re-initialize.
            - "--save"
            - ""
            - "--appendonly"
            - "no"
            - "--maxmemory"
            - "128mb"
            - "--maxmemory-policy"
            - "allkeys-lru"
          ports:
            - containerPort: 6379
              name: redis
              protocol: TCP
          # CA-471 / O-M1: container-level securityContext matching Helm CA-348.
          # readOnlyRootFilesystem intentionally false: Redis writes temp files
          # before atomic rename to /data even with RDB/AOF disabled.
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          livenessProbe:
            # CA-471 / O-M1: switch from tcpSocket to exec (matches Helm CA-226).
            # tcpSocket passes even when Redis is not accepting commands; redis-cli
            # ping validates the command plane.
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: sourcebridge
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: sourcebridge
    app.kubernetes.io/component: cache
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: sourcebridge
  ports:
    - port: 6379
      targetPort: redis
      protocol: TCP
      name: redis

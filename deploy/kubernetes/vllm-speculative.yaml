# Example: vLLM with EAGLE3 speculative decoding
# Requires NVIDIA GPU with sufficient VRAM for target + draft model
# Uses vLLM v1 engine for best performance
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-server
  namespace: sourcebridge
  labels:
    app: vllm-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm-server
  template:
    metadata:
      labels:
        app: vllm-server
    spec:
      containers:
      - name: vllm
        image: vllm/vllm-openai:latest
        args:
          - "serve"
          - "meta-llama/Llama-3.1-8B-Instruct"
          - "--speculative-config"
          - '{"model":"meta-llama/Llama-3.2-1B-Instruct","num_speculative_tokens":5}'
          - "--host"
          - "0.0.0.0"
          - "--port"
          - "8000"
          - "--max-model-len"
          - "8192"
        env:
        - name: VLLM_USE_V1
          value: "1"
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: huggingface-token
              key: token
              optional: true
        ports:
        - containerPort: 8000
          protocol: TCP
        resources:
          requests:
            memory: "16Gi"
          limits:
            memory: "32Gi"
            nvidia.com/gpu: "1"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 120
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 60
          periodSeconds: 10
      volumes:
      - name: model-cache
        persistentVolumeClaim:
          claimName: vllm-model-cache
---
apiVersion: v1
kind: Service
metadata:
  name: vllm-server
  namespace: sourcebridge
  labels:
    app: vllm-server
spec:
  selector:
    app: vllm-server
  ports:
  - port: 8000
    targetPort: 8000
    protocol: TCP
  type: ClusterIP

# API leaf TLS certificate signed by sourcebridge-ca.
#
# The API uses this cert as its client identity when dialing the worker
# under mTLS. The worker verifies it against sourcebridge-ca-tls's
# public cert (mounted as ca.crt on the worker pod).
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: sourcebridge-api-tls
  namespace: sourcebridge
  labels:
    app.kubernetes.io/part-of: sourcebridge
    app.kubernetes.io/component: api
spec:
  secretName: sourcebridge-api-tls
  duration: 2160h     # 90 days
  renewBefore: 720h   # 30 days before expiry
  privateKey:
    algorithm: ECDSA
    size: 256
    rotationPolicy: Always
  usages:
    - client auth
    - digital signature
    - key encipherment
  dnsNames:
    - sourcebridge-api
    - sourcebridge-api.sourcebridge
    - sourcebridge-api.sourcebridge.svc
    - sourcebridge-api.sourcebridge.svc.cluster.local
  issuerRef:
    name: sourcebridge-ca
    kind: Issuer
    group: cert-manager.io

apiVersion: v1
kind: ConfigMap
metadata:
  name: sourcebridge-config
  namespace: sourcebridge
data:
  SOURCEBRIDGE_SERVER_HTTP_PORT: "8080"
  SOURCEBRIDGE_STORAGE_SURREAL_MODE: "external"
  SOURCEBRIDGE_STORAGE_SURREAL_URL: "ws://surrealdb.sourcebridge.svc.cluster.local:8000"
  SOURCEBRIDGE_STORAGE_SURREAL_NAMESPACE: "sourcebridge"
  SOURCEBRIDGE_STORAGE_SURREAL_DATABASE: "main"
  SOURCEBRIDGE_STORAGE_REDIS_MODE: "memory"
  SOURCEBRIDGE_STORAGE_REPO_CACHE_PATH: "/data/repo-cache"
  # Worker gRPC address
  SOURCEBRIDGE_WORKER_ADDRESS: "worker.sourcebridge.svc.cluster.local:50051"
  # mTLS for the API↔worker gRPC channel (slice 4 of plan
  # 2026-04-29-workspace-llm-source-of-truth-r2.md). Default disabled.
  # To enable production mTLS:
  #   1. Apply mtls-issuers.yaml + mtls-worker-cert.yaml + mtls-api-cert.yaml.
  #   2. Wait for cert-manager to issue the leaf secrets (~30s).
  #   3. Flip SOURCEBRIDGE_WORKER_TLS_ENABLED to "true" in this configmap.
  #   4. kubectl rollout restart deploy/sourcebridge-api deploy/sourcebridge-worker.
  # Cert renewal: cert-manager renews 30d before expiry; OPERATOR must
  # `kubectl rollout restart` both deployments after renewal to pick up
  # the new cert (manual rotation; automated reload is a follow-up).
  SOURCEBRIDGE_WORKER_TLS_ENABLED: "false"
  SOURCEBRIDGE_WORKER_TLS_CERT_PATH: "/etc/sourcebridge/tls/tls.crt"
  SOURCEBRIDGE_WORKER_TLS_KEY_PATH: "/etc/sourcebridge/tls/tls.key"
  # cert-manager populates ca.crt alongside tls.crt + tls.key in every
  # leaf Certificate Secret (since v1.0). We read the CA chain from the
  # leaf Secret directly — no separate mount of the CA Secret needed.
  SOURCEBRIDGE_WORKER_TLS_CA_PATH: "/etc/sourcebridge/tls/ca.crt"
  SOURCEBRIDGE_WORKER_TLS_SERVER_NAME: "worker.sourcebridge.svc.cluster.local"
  SOURCEBRIDGE_WORKER_SURREAL_URL: "ws://surrealdb.sourcebridge.svc.cluster.local:8000"
  SOURCEBRIDGE_WORKER_SURREAL_NAMESPACE: "sourcebridge"
  SOURCEBRIDGE_WORKER_SURREAL_DATABASE: "main"
  # Public URL — change to your domain
  SOURCEBRIDGE_SERVER_PUBLIC_BASE_URL: "https://sourcebridge.example.com"
  # OIDC SSO — configure with your identity provider (optional)
  SOURCEBRIDGE_SECURITY_OIDC_ISSUER_URL: "https://auth.example.com/application/o/sourcebridge/"
  SOURCEBRIDGE_SECURITY_OIDC_REDIRECT_URL: "https://sourcebridge.example.com/auth/oidc/callback"
  # LLM settings — configure for your provider
  # Option A: Cloud (Anthropic) — set API key in secrets.yaml
  # SOURCEBRIDGE_LLM_PROVIDER: "anthropic"
  # SOURCEBRIDGE_LLM_BASE_URL: ""
  # SOURCEBRIDGE_LLM_SUMMARY_MODEL: "claude-sonnet-4-20250514"
  # Option B: Local (Ollama)
  SOURCEBRIDGE_LLM_PROVIDER: "ollama"
  SOURCEBRIDGE_LLM_BASE_URL: "http://localhost:11434/v1"
  SOURCEBRIDGE_LLM_SUMMARY_MODEL: "qwen3:32b"
  # Worker LLM settings
  SOURCEBRIDGE_WORKER_LLM_PROVIDER: "ollama"
  SOURCEBRIDGE_WORKER_LLM_BASE_URL: "http://localhost:11434/v1"
  SOURCEBRIDGE_WORKER_LLM_MODEL: "qwen3:32b"
  # Worker embedding settings
  SOURCEBRIDGE_WORKER_EMBEDDING_PROVIDER: "ollama"
  SOURCEBRIDGE_WORKER_EMBEDDING_BASE_URL: "http://localhost:11434"
  SOURCEBRIDGE_WORKER_EMBEDDING_MODEL: "nomic-embed-text"
  SOURCEBRIDGE_WORKER_EMBEDDING_DIMENSION: "768"
  # MCP (Model Context Protocol) — server for Claude Code, Codex, Cursor, etc.
  # NOTE: MCP sessions are stored in-process. If you enable this, set the API
  # deployment to replicas=1 (see api.yaml) until shared session storage lands,
  # otherwise clients will see intermittent "Invalid or expired session" errors
  # as requests round-robin between pods.
  SOURCEBRIDGE_MCP_ENABLED: "false"
  SOURCEBRIDGE_MCP_SESSION_TTL: "3600"
  SOURCEBRIDGE_MCP_KEEPALIVE: "30"
  SOURCEBRIDGE_MCP_MAX_SESSIONS: "100"
  # Comma-separated repo ID allowlist (empty = all repos accessible via MCP)
  # SOURCEBRIDGE_MCP_REPOS: ""

  # Knowledge generation pressure controls
  SOURCEBRIDGE_KNOWLEDGE_MAX_CONCURRENCY: "1"
  SOURCEBRIDGE_HIERARCHICAL_CONCURRENCY: "3"
  SOURCEBRIDGE_HIERARCHICAL_LEAF_MAX_TOKENS: "384"
  SOURCEBRIDGE_HIERARCHICAL_FILE_MAX_TOKENS: "640"
  SOURCEBRIDGE_HIERARCHICAL_PACKAGE_MAX_TOKENS: "896"
  SOURCEBRIDGE_HIERARCHICAL_ROOT_MAX_TOKENS: "1280"

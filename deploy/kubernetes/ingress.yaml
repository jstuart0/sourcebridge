apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sourcebridge-ingress
  namespace: sourcebridge
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-production
spec:
  ingressClassName: traefik
  tls:
  - hosts:
    - sourcebridge.example.com
    secretName: sourcebridge-tls
  rules:
  - host: sourcebridge.example.com
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: sourcebridge-api
            port:
              number: 8080
      - path: /auth
        pathType: Prefix
        backend:
          service:
            name: sourcebridge-api
            port:
              number: 8080
      - path: /healthz
        pathType: Exact
        backend:
          service:
            name: sourcebridge-api
            port:
              number: 8080
      - path: /readyz
        pathType: Exact
        backend:
          service:
            name: sourcebridge-api
            port:
              number: 8080
      - path: /metrics
        pathType: Exact
        backend:
          service:
            name: sourcebridge-api
            port:
              number: 8080
      - path: /
        pathType: Prefix
        backend:
          service:
            name: sourcebridge-web
            port:
              number: 3000

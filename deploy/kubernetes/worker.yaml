apiVersion: apps/v1
kind: Deployment
metadata:
  name: sourcebridge-worker
  namespace: sourcebridge
  labels:
    app.kubernetes.io/name: sourcebridge-worker
    app.kubernetes.io/part-of: sourcebridge
    app.kubernetes.io/component: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sourcebridge-worker
      app.kubernetes.io/part-of: sourcebridge
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sourcebridge-worker
        app.kubernetes.io/part-of: sourcebridge
        app.kubernetes.io/component: worker
    spec:
      containers:
        - name: sourcebridge-worker
          image: ghcr.io/sourcebridge/sourcebridge-worker:latest
          ports:
            - containerPort: 50051
              name: grpc
              protocol: TCP
          envFrom:
            - configMapRef:
                name: sourcebridge-config
            - secretRef:
                name: sourcebridge-secrets
          volumeMounts:
            # mTLS material — only consumed when SOURCEBRIDGE_WORKER_TLS_ENABLED=true.
            # cert-manager-managed; renewed automatically. After cert-manager
            # rotates the leaf, OPERATOR must `kubectl rollout restart` to
            # pick up the new cert (manual rotation per slice 4 of the plan;
            # automated reload deferred to a follow-up).
            - name: tls-server
              mountPath: /etc/sourcebridge/tls
              readOnly: true
            - name: tls-ca
              mountPath: /etc/sourcebridge/tls-ca
              readOnly: true
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
      volumes:
        - name: tls-server
          secret:
            secretName: sourcebridge-worker-tls
            optional: true
        - name: tls-ca
          secret:
            secretName: sourcebridge-ca-tls
            optional: true
---
apiVersion: v1
kind: Service
metadata:
  name: worker
  namespace: sourcebridge
  labels:
    app.kubernetes.io/name: sourcebridge-worker
    app.kubernetes.io/part-of: sourcebridge
    app.kubernetes.io/component: worker
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: sourcebridge-worker
    app.kubernetes.io/part-of: sourcebridge
  ports:
    - port: 50051
      targetPort: grpc
      protocol: TCP
      name: grpc

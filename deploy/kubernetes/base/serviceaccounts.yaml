apiVersion: v1
kind: ServiceAccount
metadata:
  name: sourcebridge-api
  namespace: sourcebridge
  labels:
    app.kubernetes.io/name: sourcebridge-api
    app.kubernetes.io/part-of: sourcebridge
    app.kubernetes.io/component: api
# Disable automatic SA token mount — the API server does not call
# the Kubernetes API and does not need a projected service-account token.
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sourcebridge-worker
  namespace: sourcebridge
  labels:
    app.kubernetes.io/name: sourcebridge-worker
    app.kubernetes.io/part-of: sourcebridge
    app.kubernetes.io/component: worker
# Disable automatic SA token mount — the worker communicates only via
# gRPC with the API pod and has no need for Kubernetes API access.
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sourcebridge-web
  namespace: sourcebridge
  labels:
    app.kubernetes.io/name: sourcebridge-web
    app.kubernetes.io/part-of: sourcebridge
    app.kubernetes.io/component: web
# Disable automatic SA token mount — the Next.js server proxies to
# the API and has no need for Kubernetes API access.
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: surrealdb
  namespace: sourcebridge
  labels:
    app.kubernetes.io/name: surrealdb
    app.kubernetes.io/part-of: sourcebridge
    app.kubernetes.io/component: database
# Disable automatic SA token mount — SurrealDB does not need
# Kubernetes API access.
automountServiceAccountToken: false

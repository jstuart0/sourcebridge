apiVersion: apps/v1
kind: Deployment
metadata:
  name: sourcebridge-worker
  namespace: sourcebridge
  labels:
    app.kubernetes.io/name: sourcebridge-worker
    app.kubernetes.io/part-of: sourcebridge
    app.kubernetes.io/component: worker
  annotations:
    # Stakater Reloader watches this Secret and triggers a rolling
    # restart whenever cert-manager rotates the worker mTLS material.
    # Combined with terminationGracePeriodSeconds + the worker drain
    # path in workers/__main__.py (R3 followups T1.8), this is the
    # automated cert-rotation closure for A2 of the R3 followups doc.
    #
    # If Reloader is not installed in the cluster, this annotation is
    # a no-op — the manual `kubectl rollout restart` still works.
    secret.reloader.stakater.com/reload: "sourcebridge-worker-tls"
spec:
  replicas: 1
  # Zero-disruption rolling updates: never tear down the old pod until the
  # new one is actually accepting gRPC connections. Without this, every
  # worker rollout creates a window where the API can't reach any worker
  # at all and in-flight knowledge / living-wiki jobs fail with
  # "connection refused: 10.105.15.233:50051".
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: sourcebridge-worker
      app.kubernetes.io/part-of: sourcebridge
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sourcebridge-worker
        app.kubernetes.io/part-of: sourcebridge
        app.kubernetes.io/component: worker
    spec:
      # R3 followups T1.8: graceful drain on cert rotations + planned
      # restarts. The worker process flips its health-servicer to
      # NOT_SERVING on SIGTERM, then calls grpc.aio.server.stop(grace=N)
      # where N = SOURCEBRIDGE_WORKER_SHUTDOWN_GRACE_SECONDS (default
      # 3600s = 60 minutes; matches TimeoutKnowledgeRepository on the Go
      # client). terminationGracePeriodSeconds MUST exceed N so kubelet's
      # SIGKILL stays the outer bound. 3900s = 65 minutes provides a
      # 5-minute slack for the orderly close-providers step that follows
      # server.stop.
      terminationGracePeriodSeconds: 3900
      containers:
        - name: sourcebridge-worker
          image: ghcr.io/sourcebridge-ai/sourcebridge-worker:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 50051
              name: grpc
              protocol: TCP
          envFrom:
            - configMapRef:
                name: sourcebridge-config
            - secretRef:
                name: sourcebridge-secrets
          volumeMounts:
            # mTLS material — only consumed when SOURCEBRIDGE_WORKER_TLS_ENABLED=true.
            # cert-manager-managed; renewed automatically. After cert-manager
            # rotates the leaf, OPERATOR must `kubectl rollout restart` to
            # pick up the new cert (manual rotation per slice 4 of plan
            # 2026-04-29-workspace-llm-source-of-truth-r2.md).
            - name: tls-server
              mountPath: /etc/sourcebridge/tls
              readOnly: true
            - name: tls-ca
              mountPath: /etc/sourcebridge/tls-ca
              readOnly: true
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          # gRPC native probes (Kubernetes 1.24+). Replaces the prior
          # tcpSocket probe so the kubelet observes the worker's
          # health-servicer NOT_SERVING flip during drain — TCP staying
          # open during the grace window is no longer interpreted as
          # "still ready for new traffic." The worker publishes an
          # aggregate health record under service="" alongside the
          # per-service entries; native probes use the empty string to
          # match that aggregate.
          #
          # R3 followups T1.8: the drain sequence (workers/__main__.py)
          # flips this aggregate to NOT_SERVING on SIGTERM, immediately
          # making the readiness probe fail and stopping new work from
          # attaching during the up-to-60-minute graceful drain.
          #
          # Startup probe still gives the worker up to 90 s to come up
          # cold (Python imports + ML client warmup); after that the
          # readiness probe takes over with tighter timing.
          startupProbe:
            grpc:
              port: 50051
              service: ""
            initialDelaySeconds: 5
            periodSeconds: 3
            failureThreshold: 30
          readinessProbe:
            grpc:
              port: 50051
              service: ""
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            grpc:
              port: 50051
              service: ""
            periodSeconds: 30
            failureThreshold: 3
      volumes:
        - name: tls-server
          secret:
            secretName: sourcebridge-worker-tls
            optional: true
        - name: tls-ca
          secret:
            secretName: sourcebridge-ca-tls
            optional: true
---
apiVersion: v1
kind: Service
metadata:
  name: worker
  namespace: sourcebridge
  labels:
    app.kubernetes.io/name: sourcebridge-worker
    app.kubernetes.io/part-of: sourcebridge
    app.kubernetes.io/component: worker
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: sourcebridge-worker
    app.kubernetes.io/part-of: sourcebridge
  ports:
    - port: 50051
      targetPort: grpc
      protocol: TCP
      name: grpc

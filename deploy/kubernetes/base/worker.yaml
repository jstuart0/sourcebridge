apiVersion: apps/v1
kind: Deployment
metadata:
  name: sourcebridge-worker
  namespace: sourcebridge
  labels:
    app.kubernetes.io/name: sourcebridge-worker
    app.kubernetes.io/part-of: sourcebridge
    app.kubernetes.io/component: worker
  annotations:
    # Stakater Reloader watches these Secrets and triggers a rolling
    # restart whenever cert-manager rotates the worker mTLS material
    # (leaf cert) or the trusted-CA bundle. Combined with
    # terminationGracePeriodSeconds + the worker drain path in
    # workers/__main__.py (R3 followups T1.8), this is the automated
    # cert-rotation closure for A2 of the R3 followups doc.
    #
    # Both the leaf and the CA are watched (codex r2 Low fix): the
    # leaf rotates on a 90-day cycle; the CA is long-lived but a
    # forced CA rotation (e.g. compromise response) needs the same
    # graceful-restart treatment because the worker's
    # grpc.ssl_server_credentials trust bundle is captured at boot.
    #
    # If Reloader is not installed in the cluster, this annotation is
    # a no-op — the manual `kubectl rollout restart` still works.
    secret.reloader.stakater.com/reload: "sourcebridge-worker-tls,sourcebridge-ca-tls"
spec:
  replicas: 1
  # Zero-disruption rolling updates: never tear down the old pod until the
  # new one is actually accepting gRPC connections. Without this, every
  # worker rollout creates a window where the API can't reach any worker
  # at all and in-flight knowledge / living-wiki jobs fail with
  # "connection refused: 10.105.15.233:50051".
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: sourcebridge-worker
      app.kubernetes.io/part-of: sourcebridge
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sourcebridge-worker
        app.kubernetes.io/part-of: sourcebridge
        app.kubernetes.io/component: worker
    spec:
      # R3 followups T1.8: graceful drain on cert rotations + planned
      # restarts. The worker process flips its health-servicer to
      # NOT_SERVING on SIGTERM, then calls grpc.aio.server.stop(grace=N)
      # where N = SOURCEBRIDGE_WORKER_SHUTDOWN_GRACE_SECONDS (default
      # 3600s = 60 minutes; matches TimeoutKnowledgeRepository on the Go
      # client). terminationGracePeriodSeconds MUST exceed N so kubelet's
      # SIGKILL stays the outer bound. 3900s = 65 minutes provides a
      # 5-minute slack for the orderly close-providers step that follows
      # server.stop.
      terminationGracePeriodSeconds: 3900
      containers:
        - name: sourcebridge-worker
          image: ghcr.io/sourcebridge-ai/sourcebridge-worker:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 50051
              name: grpc
              protocol: TCP
          envFrom:
            - configMapRef:
                name: sourcebridge-config
            - secretRef:
                name: sourcebridge-secrets
          volumeMounts:
            # mTLS material — only consumed when SOURCEBRIDGE_WORKER_TLS_ENABLED=true.
            # cert-manager-managed; renewed automatically. After cert-manager
            # rotates the leaf, OPERATOR must `kubectl rollout restart` to
            # pick up the new cert (manual rotation per slice 4 of plan
            # 2026-04-29-workspace-llm-source-of-truth-r2.md).
            - name: tls-server
              mountPath: /etc/sourcebridge/tls
              readOnly: true
            - name: tls-ca
              mountPath: /etc/sourcebridge/tls-ca
              readOnly: true
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          # gRPC health probes via exec — codex r2 fix to T1.8.
          # Kubernetes' built-in `grpc:` probe transport does NOT support
          # client TLS authentication, so it can't probe an mTLS worker
          # that requires `require_client_auth=True`. We ship
          # grpc_health_probe in the worker image (Dockerfile.worker) and
          # invoke it through a tiny wrapper script that conditionally
          # adds -tls flags based on SOURCEBRIDGE_WORKER_TLS_ENABLED.
          # Works equally well for plaintext (current homelab) and mTLS
          # (when flipped on) without any deploy-time manifest change.
          #
          # The probe queries the gRPC health-servicer's aggregate
          # service ("" by default for grpc_health_probe), which the
          # worker publishes alongside per-service entries. R3 followups
          # T1.8: the drain sequence flips this aggregate to NOT_SERVING
          # on SIGTERM so readiness fails immediately during drain.
          #
          # Startup probe gives the worker up to 90 s to come up cold
          # (Python imports + ML client warmup); after that the
          # readiness probe takes over with tighter timing.
          startupProbe:
            exec:
              command: ["/usr/local/bin/sourcebridge-health-probe.sh"]
            initialDelaySeconds: 5
            periodSeconds: 3
            failureThreshold: 30
            timeoutSeconds: 3
          readinessProbe:
            exec:
              command: ["/usr/local/bin/sourcebridge-health-probe.sh"]
            periodSeconds: 5
            failureThreshold: 3
            timeoutSeconds: 3
          livenessProbe:
            exec:
              command: ["/usr/local/bin/sourcebridge-health-probe.sh"]
            periodSeconds: 30
            failureThreshold: 3
            timeoutSeconds: 5
      volumes:
        - name: tls-server
          secret:
            secretName: sourcebridge-worker-tls
            optional: true
        - name: tls-ca
          secret:
            secretName: sourcebridge-ca-tls
            optional: true
---
apiVersion: v1
kind: Service
metadata:
  name: worker
  namespace: sourcebridge
  labels:
    app.kubernetes.io/name: sourcebridge-worker
    app.kubernetes.io/part-of: sourcebridge
    app.kubernetes.io/component: worker
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: sourcebridge-worker
    app.kubernetes.io/part-of: sourcebridge
  ports:
    - port: 50051
      targetPort: grpc
      protocol: TCP
      name: grpc

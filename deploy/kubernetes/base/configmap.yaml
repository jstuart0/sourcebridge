apiVersion: v1
kind: ConfigMap
metadata:
  name: sourcebridge-config
  namespace: sourcebridge
data:
  SOURCEBRIDGE_SERVER_HTTP_PORT: "8080"
  SOURCEBRIDGE_STORAGE_SURREAL_MODE: "external"
  SOURCEBRIDGE_STORAGE_SURREAL_URL: "ws://surrealdb.sourcebridge.svc.cluster.local:8000"
  SOURCEBRIDGE_STORAGE_SURREAL_NAMESPACE: "sourcebridge"
  SOURCEBRIDGE_STORAGE_SURREAL_DATABASE: "sourcebridge"
  SOURCEBRIDGE_STORAGE_REDIS_MODE: "memory"
  SOURCEBRIDGE_STORAGE_REPO_CACHE_PATH: "/data/repo-cache"
  # Worker gRPC address (Viper reads SOURCEBRIDGE_WORKER_ADDRESS)
  SOURCEBRIDGE_WORKER_ADDRESS: "worker.sourcebridge.svc.cluster.local:50051"
  # mTLS for the API↔worker gRPC channel (slice 4 of plan
  # 2026-04-29-workspace-llm-source-of-truth-r2.md). Default disabled.
  # To enable production mTLS:
  #   1. Apply the cert-manager manifests at deploy/kubernetes/mtls-*.yaml
  #      (or a homelab-overlay equivalent).
  #   2. Wait for cert-manager to issue the leaf secrets (~30s).
  #   3. Flip SOURCEBRIDGE_WORKER_TLS_ENABLED to "true" via overlay patch.
  #   4. kubectl rollout restart deploy/sourcebridge-api deploy/sourcebridge-worker.
  # Cert renewal: cert-manager renews 30d before expiry. The Go API
  # process hot-reloads cert + CA material on disk via fsnotify +
  # 5-minute polling fallback (R3 slice 4) — no API rollout required.
  # The Python worker pod still requires `kubectl rollout restart`
  # (or Stakater Reloader watching the cert Secret) on rotation;
  # process-level Python hot reload was deferred per R3 codex r1
  # (grpc.aio in-flight cancellation risk for long knowledge jobs).
  SOURCEBRIDGE_WORKER_TLS_ENABLED: "false"
  SOURCEBRIDGE_WORKER_TLS_CERT_PATH: "/etc/sourcebridge/tls/tls.crt"
  SOURCEBRIDGE_WORKER_TLS_KEY_PATH: "/etc/sourcebridge/tls/tls.key"
  # cert-manager populates ca.crt alongside tls.crt + tls.key in every
  # leaf Certificate Secret (since v1.0). We read the CA chain from the
  # leaf Secret directly — no separate mount of the CA Secret needed.
  SOURCEBRIDGE_WORKER_TLS_CA_PATH: "/etc/sourcebridge/tls/ca.crt"
  SOURCEBRIDGE_WORKER_TLS_SERVER_NAME: "worker.sourcebridge.svc.cluster.local"
  SOURCEBRIDGE_WORKER_SURREAL_URL: "ws://surrealdb.sourcebridge.svc.cluster.local:8000"
  SOURCEBRIDGE_WORKER_SURREAL_NAMESPACE: "sourcebridge"
  SOURCEBRIDGE_WORKER_SURREAL_DATABASE: "sourcebridge"
  SOURCEBRIDGE_SERVER_PUBLIC_BASE_URL: "https://sourcebridge.example.com"
  # API server LLM settings
  SOURCEBRIDGE_LLM_PROVIDER: "ollama"
  # CA-227: an unset overlay leaves this URL unresolvable so the LLM client
  # fails fast rather than spinning on a hostname like "CHANGE-ME-set-via-overlay"
  # that DNS keeps trying to resolve. RFC 2606 .invalid TLD is reserved and
  # never resolves; port 0 makes the failure unambiguous in logs.
  SOURCEBRIDGE_LLM_BASE_URL: "http://no-llm-configured-set-via-overlay.invalid:0"
  SOURCEBRIDGE_LLM_SUMMARY_MODEL: "qwen2.5:32b"
  # Worker LLM settings
  SOURCEBRIDGE_WORKER_LLM_PROVIDER: "ollama"
  # CA-227: same fail-fast pattern as the API LLM URL above.
  SOURCEBRIDGE_WORKER_LLM_BASE_URL: "http://no-llm-configured-set-via-overlay.invalid:0"
  SOURCEBRIDGE_WORKER_LLM_MODEL: "qwen2.5:32b"
  # Worker embedding settings
  SOURCEBRIDGE_WORKER_EMBEDDING_PROVIDER: "ollama"
  # CA-227: same fail-fast pattern.
  SOURCEBRIDGE_WORKER_EMBEDDING_BASE_URL: "http://no-embedding-configured-set-via-overlay.invalid:0"
  SOURCEBRIDGE_WORKER_EMBEDDING_MODEL: "nomic-embed-text"
  SOURCEBRIDGE_WORKER_EMBEDDING_DIMENSION: "768"
  # CA-214: LLM base URL SSRF guard. Default "true" preserves current behavior
  # (Ollama on localhost is allowed). Set to "false" on multi-tenant public
  # deployments to block LLM endpoint URLs that resolve to private/internal IPs.
  SOURCEBRIDGE_LLM_ALLOW_PRIVATE_BASE_URL: "true"
  SOURCEBRIDGE_WORKER_LLM_ALLOW_PRIVATE_BASE_URL: "true"
  # CA-215: Minimum admin password length. Default 8 preserves current behavior.
  # Increase (e.g. "12") to enforce a stronger minimum.
  SOURCEBRIDGE_AUTH_PASSWORD_MIN_LENGTH: "8"
  # Knowledge generation pressure controls
  SOURCEBRIDGE_KNOWLEDGE_MAX_CONCURRENCY: "1"
  SOURCEBRIDGE_HIERARCHICAL_CONCURRENCY: "3"
  SOURCEBRIDGE_HIERARCHICAL_LEAF_MAX_TOKENS: "384"
  SOURCEBRIDGE_HIERARCHICAL_FILE_MAX_TOKENS: "640"
  SOURCEBRIDGE_HIERARCHICAL_PACKAGE_MAX_TOKENS: "896"
  SOURCEBRIDGE_HIERARCHICAL_ROOT_MAX_TOKENS: "1280"

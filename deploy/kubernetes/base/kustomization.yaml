apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: sourcebridge
resources:
  - namespace.yaml
  - configmap.yaml
  - surrealdb.yaml
  - api.yaml
  - worker.yaml
  - web.yaml
  - ingress.yaml

# Canonical image names for the OSS build.
# Overlays rewrite these via the `images:` block — change newName to
# your registry and newTag to the specific SHA or version you're deploying.
#
# Example overlay patch:
#   images:
#     - name: ghcr.io/sourcebridge-ai/sourcebridge-api
#       newName: ghcr.io/your-org/sourcebridge-api
#       newTag: sha-abc1234
images:
  - name: ghcr.io/sourcebridge-ai/sourcebridge-api
  - name: ghcr.io/sourcebridge-ai/sourcebridge-worker
  - name: ghcr.io/sourcebridge-ai/sourcebridge-web

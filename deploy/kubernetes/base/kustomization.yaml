apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: sourcebridge
resources:
  - namespace.yaml
  - configmap.yaml
  # ServiceAccounts must precede the workloads that reference them so
  # that a first-time `kubectl apply` does not encounter
  # "serviceaccount not found" warnings during object creation.
  - serviceaccounts.yaml
  - surrealdb.yaml
  - api.yaml
  - api-pdb.yaml
  - worker.yaml
  - web.yaml
  - api-servicemonitor.yaml
  - ingress.yaml
  - networkpolicy.yaml

# Image refs — overlays rewrite via `images:` block (newName/newTag) for per-cluster registries.
images:
  - name: ghcr.io/sourcebridge-ai/sourcebridge-api
  - name: ghcr.io/sourcebridge-ai/sourcebridge-worker
  - name: ghcr.io/sourcebridge-ai/sourcebridge-web

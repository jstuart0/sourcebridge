apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: surrealdb
  namespace: sourcebridge
  labels:
    app.kubernetes.io/name: surrealdb
    app.kubernetes.io/part-of: sourcebridge
    app.kubernetes.io/component: database
spec:
  serviceName: surrealdb
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: surrealdb
      app.kubernetes.io/part-of: sourcebridge
  template:
    metadata:
      labels:
        app.kubernetes.io/name: surrealdb
        app.kubernetes.io/part-of: sourcebridge
        app.kubernetes.io/component: database
    spec:
      serviceAccountName: surrealdb
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        fsGroup: 65532
      # Ensure the PVC mount is owned by the surrealdb runtime user (65532)
      # before the main container starts. This mirrors the surrealdb-init
      # service in docker-compose.yml and handles fresh PVCs that default
      # to root ownership.
      initContainers:
        - name: surrealdb-data-chown
          image: alpine:3.20
          command: ["chown", "-R", "65532:65532", "/data"]
          volumeMounts:
            - name: surrealdb-data
              mountPath: /data
          securityContext:
            allowPrivilegeEscalation: false
            runAsUser: 0
            capabilities:
              drop: ["ALL"]
              add: ["CHOWN", "DAC_OVERRIDE"]
      containers:
        - name: surrealdb
          image: surrealdb/surrealdb:v2.2.1
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: false
          args: ["start", "--log", "info", "--user", "$(SURREAL_USER)", "--pass", "$(SURREAL_PASS)", "--bind", "0.0.0.0:8000", "file:/data/sourcebridge.db"]
          env:
            - name: SURREAL_USER
              valueFrom:
                secretKeyRef:
                  name: sourcebridge-secrets
                  key: SOURCEBRIDGE_STORAGE_SURREAL_USER
            - name: SURREAL_PASS
              valueFrom:
                secretKeyRef:
                  name: sourcebridge-secrets
                  key: SOURCEBRIDGE_STORAGE_SURREAL_PASS
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: surrealdb-data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: surrealdb-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: surrealdb
  namespace: sourcebridge
  labels:
    app.kubernetes.io/name: surrealdb
    app.kubernetes.io/part-of: sourcebridge
    app.kubernetes.io/component: database
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: surrealdb
    app.kubernetes.io/part-of: sourcebridge
  ports:
    - port: 8000
      targetPort: http
      protocol: TCP
      name: http

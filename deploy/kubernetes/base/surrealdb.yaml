# OPERATOR RESPONSIBILITY — storageClassName:
# The volumeClaimTemplate below sets storageClassName to a placeholder
# value.  Before applying, operators MUST replace it with a StorageClass
# whose reclaimPolicy is "Retain" so that deleting the StatefulSet (or its
# PVC) does NOT destroy the SurrealDB data volume.
#
# Create a Retain-policy StorageClass, e.g. for a Ceph/RBD cluster:
#   kubectl patch storageclass <your-class> \
#     -p '{"reclaimPolicy":"Retain"}'
# Then set storageClassName in the overlay:
#   images: []
#   patches:
#     - target: {kind: StatefulSet, name: surrealdb}
#       patch: |
#         - op: replace
#           path: /spec/volumeClaimTemplates/0/spec/storageClassName
#           value: <your-retain-class>
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: surrealdb
  namespace: sourcebridge
  labels:
    app.kubernetes.io/name: surrealdb
    app.kubernetes.io/part-of: sourcebridge
    app.kubernetes.io/component: database
spec:
  serviceName: surrealdb
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: surrealdb
      app.kubernetes.io/part-of: sourcebridge
  template:
    metadata:
      labels:
        app.kubernetes.io/name: surrealdb
        app.kubernetes.io/part-of: sourcebridge
        app.kubernetes.io/component: database
    spec:
      serviceAccountName: surrealdb
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        fsGroup: 65532
      # Ensure the PVC mount is owned by the surrealdb runtime user (65532)
      # before the main container starts. This mirrors the surrealdb-init
      # service in docker-compose.yml and handles fresh PVCs that default
      # to root ownership.
      initContainers:
        - name: surrealdb-data-chown
          image: alpine:3.20
          command: ["chown", "-R", "65532:65532", "/data"]
          volumeMounts:
            - name: surrealdb-data
              mountPath: /data
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: false   # required: chown needs uid 0; pod-level runAsNonRoot:true would otherwise reject this initContainer (codex r2 H2 fix)
            runAsUser: 0
            capabilities:
              drop: ["ALL"]
              add: ["CHOWN", "DAC_OVERRIDE"]
      containers:
        - name: surrealdb
          image: surrealdb/surrealdb:v2.6.5
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: false
          args: ["start", "--log", "info", "--user", "$(SURREAL_USER)", "--pass", "$(SURREAL_PASS)", "--bind", "0.0.0.0:8000", "file:/data/sourcebridge.db"]
          env:
            - name: SURREAL_USER
              valueFrom:
                secretKeyRef:
                  name: sourcebridge-secrets
                  key: SOURCEBRIDGE_STORAGE_SURREAL_USER
            - name: SURREAL_PASS
              valueFrom:
                secretKeyRef:
                  name: sourcebridge-secrets
                  key: SOURCEBRIDGE_STORAGE_SURREAL_PASS
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          # otto Medium #18: startupProbe gives SurrealDB up to 125s
          # (5 + 3*40) to complete RocksDB compaction on startup before
          # liveness kicks in. Without this, the liveness kill-loop can
          # delay startup further under data load.
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 3
            failureThreshold: 40
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: surrealdb-data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: surrealdb-data
      spec:
        accessModes: ["ReadWriteOnce"]
        # CA-228: empty storageClassName falls back to the cluster default.
        # PRODUCTION operators MUST override with a class that has
        # reclaimPolicy: Retain so PVC deletion does not destroy the
        # database volume. See the top-of-file comment for the overlay
        # patch pattern. The default-class fallback is intended for kind /
        # microk8s / development clusters; for production deployments, the
        # overlay must explicitly set storageClassName to a Retain-policy
        # class and the operator is responsible for verifying reclaimPolicy
        # before applying.
        storageClassName: ""
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: surrealdb
  namespace: sourcebridge
  labels:
    app.kubernetes.io/name: surrealdb
    app.kubernetes.io/part-of: sourcebridge
    app.kubernetes.io/component: database
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: surrealdb
    app.kubernetes.io/part-of: sourcebridge
  ports:
    - port: 8000
      targetPort: http
      protocol: TCP
      name: http

# Requires Prometheus Operator. If absent, omit this resource via overlay or install kube-prometheus-stack.
# https://github.com/prometheus-operator/prometheus-operator
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: sourcebridge-api
  namespace: sourcebridge
  labels:
    app.kubernetes.io/name: sourcebridge-api
    app.kubernetes.io/part-of: sourcebridge
    # Default selector label matching the kube-prometheus-stack convention.
    # If your Prometheus instance selects on a different label/value, override
    # via overlay. To find your selector:
    #   kubectl get prometheus -A -o jsonpath='{..serviceMonitorSelector}'
    release: kube-prometheus
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: sourcebridge-api
      app.kubernetes.io/part-of: sourcebridge
  endpoints:
    - port: http          # named port on the sourcebridge-api Service (targetPort: 8080)
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s

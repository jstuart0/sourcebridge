apiVersion: apps/v1
kind: Deployment
metadata:
  name: sourcebridge-web
  namespace: sourcebridge
  labels:
    app.kubernetes.io/name: sourcebridge-web
    app.kubernetes.io/part-of: sourcebridge
    app.kubernetes.io/component: web
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: sourcebridge-web
      app.kubernetes.io/part-of: sourcebridge
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sourcebridge-web
        app.kubernetes.io/part-of: sourcebridge
        app.kubernetes.io/component: web
    spec:
      serviceAccountName: sourcebridge-web
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: sourcebridge-web
          # CA-300: base uses :latest so a bare `kubectl apply -k base/` is
          # runnable. Overlay `images: newTag:` or Argo Image Updater MUST pin
          # a specific release tag in production.
          image: ghcr.io/sourcebridge-ai/sourcebridge-web:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: false
          env:
            # CA-298 / CA-354: NEXT_PUBLIC_API_URL is inlined by webpack DefinePlugin
            # at `next build` time (NEXT_PUBLIC_* vars are never runtime-configurable).
            # Setting it to the public URL here is a placeholder that overlay operators
            # MUST override via a configmap-patch or deployment-patch so the client
            # bundle is built against the correct public base URL. This placeholder
            # intentionally uses the RFC 2606 .example.com domain so missing overrides
            # fail visibly rather than pointing at a live domain.
            # NOTE: SOURCEBRIDGE_WEB_DEV_PROXY (the server-side proxy target) should be
            # set to the internal API service URL (e.g. http://sourcebridge-api:8080)
            # via a configmap or overlay — it IS runtime-configurable.
            - name: NEXT_PUBLIC_API_URL
              value: "https://sourcebridge.example.com"
          ports:
            - containerPort: 3000
              name: http
              protocol: TCP
          resources:
            requests:
              memory: "128Mi"
              cpu: "125m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          # CA-352: startupProbe gives Next.js up to 60s (2 + 2*29) to complete
          # module initialization before liveness kicks in. Without this, a
          # slow node (or a cold image pull) can trigger liveness kill-loops
          # that repeatedly restart a perfectly healthy pod.
          startupProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 2
            periodSeconds: 2
            failureThreshold: 29
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: sourcebridge-web
  namespace: sourcebridge
  labels:
    app.kubernetes.io/name: sourcebridge-web
    app.kubernetes.io/part-of: sourcebridge
    app.kubernetes.io/component: web
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: sourcebridge-web
    app.kubernetes.io/part-of: sourcebridge
  ports:
    - port: 3000
      targetPort: http
      protocol: TCP
      name: http

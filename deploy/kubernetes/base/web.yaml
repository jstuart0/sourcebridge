apiVersion: apps/v1
kind: Deployment
metadata:
  name: sourcebridge-web
  namespace: sourcebridge
  labels:
    app.kubernetes.io/name: sourcebridge-web
    app.kubernetes.io/part-of: sourcebridge
    app.kubernetes.io/component: web
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: sourcebridge-web
      app.kubernetes.io/part-of: sourcebridge
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sourcebridge-web
        app.kubernetes.io/part-of: sourcebridge
        app.kubernetes.io/component: web
    spec:
      serviceAccountName: sourcebridge-web
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: sourcebridge-web
          # Tag must be overridden by an overlay images: block.
          # See kustomization.yaml images: entries — the overlay sets newTag.
          image: ghcr.io/sourcebridge-ai/sourcebridge-web:pin-via-overlay-do-not-use
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: false
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "https://sourcebridge.example.com"
          ports:
            - containerPort: 3000
              name: http
              protocol: TCP
          resources:
            requests:
              memory: "128Mi"
              cpu: "125m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          # CA-352: startupProbe gives Next.js up to 60s (2 + 2*29) to complete
          # module initialization before liveness kicks in. Without this, a
          # slow node (or a cold image pull) can trigger liveness kill-loops
          # that repeatedly restart a perfectly healthy pod.
          startupProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 2
            periodSeconds: 2
            failureThreshold: 29
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: sourcebridge-web
  namespace: sourcebridge
  labels:
    app.kubernetes.io/name: sourcebridge-web
    app.kubernetes.io/part-of: sourcebridge
    app.kubernetes.io/component: web
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: sourcebridge-web
    app.kubernetes.io/part-of: sourcebridge
  ports:
    - port: 3000
      targetPort: http
      protocol: TCP
      name: http

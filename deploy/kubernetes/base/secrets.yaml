# ============================================================================
# EXAMPLE ONLY — Do NOT apply this file directly.
#
# This file shows the secret keys required by SourceBridge. Real values must
# be provisioned outside of git using one of these approaches:
#
#   kubectl create secret generic sourcebridge-secrets \
#     --namespace sourcebridge \
#     --from-literal=SOURCEBRIDGE_SECURITY_JWT_SECRET="$(openssl rand -base64 32)" \
#     --from-literal=SOURCEBRIDGE_STORAGE_SURREAL_USER="root" \
#     --from-literal=SOURCEBRIDGE_STORAGE_SURREAL_PASS="$(openssl rand -base64 24)" \
#     --from-literal=SOURCEBRIDGE_LLM_API_KEY="sk-..." \
#     --from-literal=SOURCEBRIDGE_SECURITY_OIDC_CLIENT_ID="" \
#     --from-literal=SOURCEBRIDGE_SECURITY_OIDC_CLIENT_SECRET=""
#
# Alternatively, use Sealed Secrets, External Secrets Operator, or Helm
# values with --set-string to inject real credentials at deploy time.
# ============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: sourcebridge-secrets
  namespace: sourcebridge
  annotations:
    note: "EXAMPLE TEMPLATE — values below are placeholders, not real secrets"
type: Opaque
stringData:
  # Required: JWT signing secret — generate with: openssl rand -base64 32
  SOURCEBRIDGE_SECURITY_JWT_SECRET: "<generate-a-real-secret>"

  # Required: SurrealDB credentials
  SOURCEBRIDGE_STORAGE_SURREAL_USER: "root"
  SOURCEBRIDGE_STORAGE_SURREAL_PASS: "<generate-a-real-secret>"

  # Required for AI features: LLM API key (leave empty if using local Ollama)
  SOURCEBRIDGE_LLM_API_KEY: ""

  # Optional: OIDC SSO — leave empty to disable
  SOURCEBRIDGE_SECURITY_OIDC_CLIENT_ID: ""
  SOURCEBRIDGE_SECURITY_OIDC_CLIENT_SECRET: ""

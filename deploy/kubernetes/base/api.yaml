apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sourcebridge-repo-cache
  namespace: sourcebridge
  labels:
    app.kubernetes.io/name: sourcebridge-api
    app.kubernetes.io/part-of: sourcebridge
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sourcebridge-api
  namespace: sourcebridge
  labels:
    app.kubernetes.io/name: sourcebridge-api
    app.kubernetes.io/part-of: sourcebridge
    app.kubernetes.io/component: api
  # Reloader annotation deliberately NOT applied here — codex r2 High
  # on R3 followups T1.7 caught a real bug. The API process gives its
  # orchestrator only ~10s on SIGTERM (cli/serve.go:677-685 and
  # internal/llm/orchestrator/orchestrator.go:183-185 cancel the root
  # context immediately), so a Reloader-triggered restart would cancel
  # any in-flight 30+ minute knowledge job that lives inside an API
  # pod's RPC dispatch. The API hot-reloads its mTLS material in-
  # process via tlsreload.Watcher (R3 slice 4), so cert rotation
  # already lands without a restart. Adding Reloader as a "safety net"
  # would re-create the in-flight cancellation problem T1.8 fixes on
  # the worker side.
  #
  # If we ever need a backup restart path here, add an API drain slice
  # first: stop readiness, pause queue intake, stop accepting new
  # HTTP job starts, allow active orchestrator jobs to finish with a
  # grace window comparable to repository knowledge timeout, set
  # terminationGracePeriodSeconds accordingly.
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: sourcebridge-api
      app.kubernetes.io/part-of: sourcebridge
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sourcebridge-api
        app.kubernetes.io/part-of: sourcebridge
        app.kubernetes.io/component: api
    spec:
      containers:
        - name: sourcebridge-api
          image: ghcr.io/sourcebridge-ai/sourcebridge-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          envFrom:
            - configMapRef:
                name: sourcebridge-config
            - secretRef:
                name: sourcebridge-secrets
          volumeMounts:
            - name: repo-cache
              mountPath: /data/repo-cache
            # mTLS material — only consumed when SOURCEBRIDGE_WORKER_TLS_ENABLED=true.
            # Mounted regardless so the operator can flip the env flag without
            # a manifest change. cert-manager-managed; renewed automatically.
            - name: tls-client
              mountPath: /etc/sourcebridge/tls
              readOnly: true
            - name: tls-ca
              mountPath: /etc/sourcebridge/tls-ca
              readOnly: true
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1"
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
      volumes:
        - name: repo-cache
          persistentVolumeClaim:
            claimName: sourcebridge-repo-cache
        - name: tls-client
          secret:
            secretName: sourcebridge-api-tls
            optional: true
        - name: tls-ca
          secret:
            secretName: sourcebridge-ca-tls
            optional: true
---
apiVersion: v1
kind: Service
metadata:
  name: sourcebridge-api
  namespace: sourcebridge
  labels:
    app.kubernetes.io/name: sourcebridge-api
    app.kubernetes.io/part-of: sourcebridge
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: sourcebridge-api
    app.kubernetes.io/part-of: sourcebridge
  ports:
    - port: 8080
      targetPort: http
      protocol: TCP
      name: http

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sourcebridge-repo-cache
  namespace: sourcebridge
  labels:
    app.kubernetes.io/name: sourcebridge-api
    app.kubernetes.io/part-of: sourcebridge
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sourcebridge-api
  namespace: sourcebridge
  labels:
    app.kubernetes.io/name: sourcebridge-api
    app.kubernetes.io/part-of: sourcebridge
    app.kubernetes.io/component: api
  # Reloader annotation deliberately NOT applied here — see comment
  # above. CA-142 ships the API drain slice this block described:
  # readiness flip on SIGTERM, intake pause, 3900s grace window
  # (matching the worker), and terminationGracePeriodSeconds set below.
spec:
  replicas: 2
  # CA-142: maxUnavailable=0 ensures at least one healthy pod is always
  # serving while the draining pod waits for in-flight jobs. The surge
  # pod (maxSurge=1) starts serving immediately if the cluster has spare
  # capacity — there is no inherent single-replica unavailability. Risk:
  # if the cluster has no spare capacity the surge pod may stay pending
  # until the draining pod releases its resources. See plan D5/R2.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: sourcebridge-api
      app.kubernetes.io/part-of: sourcebridge
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sourcebridge-api
        app.kubernetes.io/part-of: sourcebridge
        app.kubernetes.io/component: api
    spec:
      # CA-142: must exceed shutdown.grace_seconds (3600) plus preStop
      # sleep (10s) plus slack. 3900s = 65 min matches the worker.
      terminationGracePeriodSeconds: 3900
      containers:
        - name: sourcebridge-api
          image: ghcr.io/sourcebridge-ai/sourcebridge-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          envFrom:
            - configMapRef:
                name: sourcebridge-config
            - secretRef:
                name: sourcebridge-secrets
          env:
            # CA-142: sets the drain grace window for the API process.
            # SOURCEBRIDGE_SHUTDOWN_GRACE_SECONDS maps to [shutdown].grace_seconds
            # via Viper's dot→underscore rule + SOURCEBRIDGE_ prefix.
            - name: SOURCEBRIDGE_SHUTDOWN_GRACE_SECONDS
              value: "3600"
          volumeMounts:
            - name: repo-cache
              mountPath: /data/repo-cache
            # mTLS material — only consumed when SOURCEBRIDGE_WORKER_TLS_ENABLED=true.
            # Mounted regardless so the operator can flip the env flag without
            # a manifest change. cert-manager-managed; renewed automatically.
            - name: tls-client
              mountPath: /etc/sourcebridge/tls
              readOnly: true
            - name: tls-ca
              mountPath: /etc/sourcebridge/tls-ca
              readOnly: true
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1"
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          # CA-142: preStop hook calls the internal listener before SIGTERM
          # so BeginDrain executes before any requests can be sent to the
          # pod by a slow endpoint controller. The sleep gives endpoints
          # time to be removed from all load balancer backends. The curl
          # uses 127.0.0.1:8081 (internal loopback listener, no auth
          # required). If the curl fails (e.g. server already shutting
          # down) we continue anyway via `|| true`.
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - |
                    curl -fsS -XPOST http://127.0.0.1:8081/internal/begin-drain || true
                    sleep 10
      volumes:
        - name: repo-cache
          persistentVolumeClaim:
            claimName: sourcebridge-repo-cache
        - name: tls-client
          secret:
            secretName: sourcebridge-api-tls
            optional: true
        - name: tls-ca
          secret:
            secretName: sourcebridge-ca-tls
            optional: true
---
apiVersion: v1
kind: Service
metadata:
  name: sourcebridge-api
  namespace: sourcebridge
  labels:
    app.kubernetes.io/name: sourcebridge-api
    app.kubernetes.io/part-of: sourcebridge
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: sourcebridge-api
    app.kubernetes.io/part-of: sourcebridge
  ports:
    - port: 8080
      targetPort: http
      protocol: TCP
      name: http

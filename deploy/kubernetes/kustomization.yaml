apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: sourcebridge
resources:
  - namespace.yaml
  - configmap.yaml
  # NOTE: secrets.yaml is an EXAMPLE TEMPLATE with placeholder values.
  # Do NOT apply directly. Create real secrets via kubectl or Sealed Secrets.
  # See secrets.yaml header for instructions.
  - secrets.yaml
  - surrealdb.yaml
  - api.yaml
  - worker.yaml
  - web.yaml
  - ingress.yaml
  # mTLS for the API↔worker gRPC channel (slice 4 of plan
  # 2026-04-29-workspace-llm-source-of-truth-r2.md). Requires cert-manager
  # to be installed cluster-wide. Default disabled via configmap; flip
  # SOURCEBRIDGE_WORKER_TLS_ENABLED=true to opt in.
  - mtls-issuers.yaml
  - mtls-worker-cert.yaml
  - mtls-api-cert.yaml

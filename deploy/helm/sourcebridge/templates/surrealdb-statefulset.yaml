{{- if .Values.surrealdb.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "sourcebridge.fullname" . }}-surrealdb
  labels:
    {{- include "sourcebridge.surrealdb.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "sourcebridge.fullname" . }}-surrealdb
  replicas: 1
  selector:
    matchLabels:
      {{- include "sourcebridge.surrealdb.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "sourcebridge.surrealdb.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.surrealdb.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.surrealdb.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.surrealdb.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: surrealdb
          image: "{{ .Values.surrealdb.image.repository }}:{{ .Values.surrealdb.image.tag }}"
          imagePullPolicy: {{ .Values.surrealdb.image.pullPolicy }}
          args:
            - start
            {{- if .Values.surrealdb.persistence.enabled }}
            - "file:///data/srdb"
            {{- end }}
            - --bind
            - "0.0.0.0:{{ .Values.surrealdb.port }}"
          {{- if .Values.secrets.create }}
          env:
            - name: SURREAL_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "sourcebridge.fullname" . }}-secrets
                  key: surrealdb-user
            - name: SURREAL_PASS
              valueFrom:
                secretKeyRef:
                  name: {{ include "sourcebridge.fullname" . }}-secrets
                  key: surrealdb-password
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.surrealdb.port }}
              protocol: TCP
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.surrealdb.resources | nindent 12 }}
          {{- if .Values.surrealdb.persistence.enabled }}
          volumeMounts:
            - name: data
              mountPath: /data
          {{- end }}
  {{- if .Values.surrealdb.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - {{ .Values.surrealdb.persistence.accessMode }}
        {{- if .Values.surrealdb.persistence.storageClass }}
        storageClassName: {{ .Values.surrealdb.persistence.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.surrealdb.persistence.size }}
  {{- end }}
{{- end }}

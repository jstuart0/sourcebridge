apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sourcebridge.fullname" . }}-web
  labels:
    {{- include "sourcebridge.web.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.web.replicas }}
  # CA-236 (O-28): zero-downtime rolling update even at replicas:1.
  # Default k8s strategy (maxSurge:25%, maxUnavailable:25%) rounds to
  # 0 surge and 1 unavailable at replicas:1, producing a momentary
  # outage on every upgrade. Surge-first matches the API/worker pattern.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      {{- include "sourcebridge.web.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "sourcebridge.web.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ include "sourcebridge.web.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.web.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.web.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.web.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: web
          image: "{{ .Values.web.image.repository }}:{{ .Values.web.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.web.image.pullPolicy }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.web.port }}
              protocol: TCP
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "http://{{ include "sourcebridge.fullname" . }}-api:{{ .Values.api.service.port }}"
            - name: SOURCEBRIDGE_WEB_DEV_PROXY
              value: "http://{{ include "sourcebridge.fullname" . }}-api:{{ .Values.api.service.port }}"
          # CA-352: startupProbe gives Next.js up to 60s (2 + 2*29) to complete
          # module initialization before liveness/readiness kick in. Without
          # this, a slow node or cold image pull triggers liveness kill-loops.
          startupProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 2
            periodSeconds: 2
            failureThreshold: 29
            timeoutSeconds: 3
          # otto Medium #13: /api/health is lighter than / (no full SSR render)
          # and correctly tests the API proxy path — the page may render from
          # cache even when the upstream API is unreachable. Matches k8s base.
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.web.resources | nindent 12 }}
          # CA-322: writable cache paths required when
          # securityContext.readOnlyRootFilesystem is true. Next.js
          # standalone build writes to /app/.next/cache for runtime
          # caches (image optimization, route manifests); /tmp covers
          # any tempfile-style needs. Without these mounts the web pod
          # crashes on first page render under readOnlyRootFilesystem.
          {{- if .Values.securityContext.readOnlyRootFilesystem }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: nextcache
              mountPath: /app/.next/cache
            {{- with .Values.web.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- else if .Values.web.extraVolumeMounts }}
          volumeMounts:
            {{- toYaml .Values.web.extraVolumeMounts | nindent 12 }}
          {{- end }}
      {{- if .Values.securityContext.readOnlyRootFilesystem }}
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: {{ .Values.web.tmpSizeLimit | default "1Gi" }}
        - name: nextcache
          emptyDir:
            sizeLimit: {{ .Values.web.nextCacheSizeLimit | default "1Gi" }}
        {{- with .Values.web.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- else if .Values.web.extraVolumes }}
      volumes:
        {{- toYaml .Values.web.extraVolumes | nindent 8 }}
      {{- end }}

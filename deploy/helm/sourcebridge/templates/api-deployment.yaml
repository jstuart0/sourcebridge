apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sourcebridge.fullname" . }}-api
  labels:
    {{- include "sourcebridge.api.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.api.replicas }}
  # CA-142: maxUnavailable=0 keeps at least one healthy pod serving during
  # a rolling update while the draining pod waits for in-flight jobs.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: {{ .Values.api.maxSurge | default 1 }}
      maxUnavailable: {{ .Values.api.maxUnavailable | default 0 }}
  selector:
    matchLabels:
      {{- include "sourcebridge.api.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "sourcebridge.api.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secrets.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ include "sourcebridge.api.serviceAccountName" . }}
      # CA-142: must exceed shutdownGraceSeconds + preStopSleepSeconds + 60s slack.
      terminationGracePeriodSeconds: {{ .Values.api.terminationGracePeriodSeconds | default 3900 }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: api
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.api.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "sourcebridge.fullname" . }}-config
          env:
            {{- if .Values.secrets.create }}
            - name: SOURCEBRIDGE_SECURITY_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "sourcebridge.fullname" . }}-secrets
                  key: jwt-secret
            - name: SOURCEBRIDGE_SECURITY_GRPC_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "sourcebridge.fullname" . }}-secrets
                  key: grpc-auth-secret
            - name: SOURCEBRIDGE_STORAGE_SURREAL_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "sourcebridge.fullname" . }}-secrets
                  key: surrealdb-user
            - name: SOURCEBRIDGE_STORAGE_SURREAL_PASS
              valueFrom:
                secretKeyRef:
                  name: {{ include "sourcebridge.fullname" . }}-secrets
                  key: surrealdb-password
            - name: SOURCEBRIDGE_SECURITY_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "sourcebridge.fullname" . }}-secrets
                  key: encryption-key
            {{- end }}
            # CA-142: drain grace window. Maps to [shutdown].grace_seconds
            # via Viper's SOURCEBRIDGE_ prefix + dot→underscore rule.
            - name: SOURCEBRIDGE_SHUTDOWN_GRACE_SECONDS
              value: {{ .Values.api.shutdownGraceSeconds | default 3600 | quote }}
            # CA-142: wire internalPort into the server bind address so the
            # preStop curl target matches the actual listener. Changing
            # internalPort without this would silently break preStop.
            - name: SOURCEBRIDGE_INTERNAL_LISTEN_ADDR
              value: "127.0.0.1:{{ .Values.api.internalPort | default 8081 }}"
            {{- range $key, $value := .Values.api.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          # CA-142: preStop hook calls the internal listener before SIGTERM
          # so BeginDrain executes before any requests can arrive. The sleep
          # gives load-balancer endpoint removal time to propagate.
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - |
                    curl -fsS -XPOST http://127.0.0.1:{{ .Values.api.internalPort | default 8081 }}/internal/begin-drain || true
                    sleep {{ .Values.api.preStopSleepSeconds | default 10 }}
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}

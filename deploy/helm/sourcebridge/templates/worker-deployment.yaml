apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sourcebridge.fullname" . }}-worker
  labels:
    {{- include "sourcebridge.worker.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.worker.replicas }}
  selector:
    matchLabels:
      {{- include "sourcebridge.worker.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "sourcebridge.worker.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.worker.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.worker.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.worker.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: worker
          image: "{{ .Values.worker.image.repository }}:{{ .Values.worker.image.tag }}"
          imagePullPolicy: {{ .Values.worker.image.pullPolicy }}
          env:
            {{- if .Values.surrealdb.enabled }}
            - name: SURREALDB_URL
              value: {{ include "sourcebridge.surrealdb.url" . }}
            {{- end }}
            {{- if .Values.redis.enabled }}
            - name: REDIS_URL
              value: {{ include "sourcebridge.redis.url" . }}
            {{- end }}
            {{- if .Values.secrets.create }}
            - name: SURREALDB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "sourcebridge.fullname" . }}-secrets
                  key: surrealdb-user
            - name: SURREALDB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "sourcebridge.fullname" . }}-secrets
                  key: surrealdb-password
            - name: LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "sourcebridge.fullname" . }}-secrets
                  key: llm-api-key
                  optional: true
            {{- end }}
            {{- range $key, $value := .Values.worker.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          ports:
            - name: grpc
              containerPort: 50051
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "sourcebridge.fullname" . }}-config
          readinessProbe:
            grpc:
              port: 50051
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            grpc:
              port: 50051
            initialDelaySeconds: 20
            periodSeconds: 30
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}

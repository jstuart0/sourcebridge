{{/*
CA-230: Four per-component ServiceAccounts — api, worker, web, surrealdb.
Each has automountServiceAccountToken: false for least-privilege posture,
mirroring deploy/kubernetes/base/serviceaccounts.yaml.

Operators can opt out of all four with serviceAccount.create: false, or
override individual SA names via serviceAccount.{api,worker,web,surrealdb}Name.
*/}}
{{- if .Values.serviceAccount.create }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "sourcebridge.api.serviceAccountName" . }}
  labels:
    {{- include "sourcebridge.api.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "sourcebridge.worker.serviceAccountName" . }}
  labels:
    {{- include "sourcebridge.worker.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "sourcebridge.web.serviceAccountName" . }}
  labels:
    {{- include "sourcebridge.web.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "sourcebridge.surrealdb.serviceAccountName" . }}
  labels:
    {{- include "sourcebridge.surrealdb.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: false
{{- end }}

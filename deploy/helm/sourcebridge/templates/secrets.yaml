{{- if .Values.secrets.create }}
{{/*
CA-233: sticky-secret pattern. If the Secret already exists in the cluster,
read back its current data values so `helm upgrade` never regenerates secrets
that were auto-generated on first install. Without this, deleting the Secret
and running `helm upgrade` produces a new encryption key, making all stored
LLM API keys and git PATs permanently unreadable.

The lookup returns nil when the Secret does not yet exist (first install), so
the `default (randAlphaNum N)` branch fires and generates fresh values.
`helm.sh/resource-policy: keep` remains for belt-and-suspenders — it prevents
`helm uninstall` from deleting the Secret, but does NOT protect against
`kubectl delete secret`. The lookup pattern handles the kubectl-delete scenario.
*/}}
{{- $secretName := printf "%s-secrets" (include "sourcebridge.fullname" .) }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "sourcebridge.labels" . | nindent 4 }}
  annotations:
    # helm.sh/resource-policy: keep prevents `helm uninstall` from deleting
    # the Secret. The lookup pattern above (CA-233) prevents `helm upgrade`
    # from regenerating values even if the Secret was deleted between upgrades.
    "helm.sh/resource-policy": keep
type: Opaque
data:
  # ─── Authentication secrets ────────────────────────────────────────
  {{- if .Values.secrets.jwtSecret }}
  jwt-secret: {{ .Values.secrets.jwtSecret | b64enc | quote }}
  {{- else if and $existing $existing.data (index $existing.data "jwt-secret") }}
  jwt-secret: {{ index $existing.data "jwt-secret" | quote }}
  {{- else }}
  jwt-secret: {{ randAlphaNum 32 | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.grpcAuthSecret }}
  grpc-auth-secret: {{ .Values.secrets.grpcAuthSecret | b64enc | quote }}
  {{- else if and $existing $existing.data (index $existing.data "grpc-auth-secret") }}
  grpc-auth-secret: {{ index $existing.data "grpc-auth-secret" | quote }}
  {{- else }}
  grpc-auth-secret: {{ randAlphaNum 32 | b64enc | quote }}
  {{- end }}

  # ─── SurrealDB credentials ────────────────────────────────────────
  surrealdb-user: {{ .Values.secrets.surrealdbUser | b64enc | quote }}
  {{- if .Values.secrets.surrealdbPassword }}
  surrealdb-password: {{ .Values.secrets.surrealdbPassword | b64enc | quote }}
  {{- else if and $existing $existing.data (index $existing.data "surrealdb-password") }}
  surrealdb-password: {{ index $existing.data "surrealdb-password" | quote }}
  {{- else }}
  surrealdb-password: {{ randAlphaNum 24 | b64enc | quote }}
  {{- end }}

  # ─── Redis password (optional) ────────────────────────────────────
  {{- if .Values.secrets.redisPassword }}
  redis-password: {{ .Values.secrets.redisPassword | b64enc | quote }}
  {{- else if and $existing $existing.data (index $existing.data "redis-password") }}
  redis-password: {{ index $existing.data "redis-password" | quote }}
  {{- end }}

  # ─── Encryption key ───────────────────────────────────────────────
  # Auto-generated (32 alphanumeric chars) on first install if left empty.
  # CA-233: the lookup pattern above preserves the existing key on `helm upgrade`
  # even if the Secret was deleted manually between upgrades. Without this, a
  # delete + upgrade cycle generates a NEW random key and ALL stored LLM API
  # keys and git PATs become permanently unreadable.
  # To pin an explicit key: --set secrets.encryptionKey="$(openssl rand -hex 32)"
  {{- if .Values.secrets.encryptionKey }}
  encryption-key: {{ .Values.secrets.encryptionKey | b64enc | quote }}
  {{- else if and $existing $existing.data (index $existing.data "encryption-key") }}
  encryption-key: {{ index $existing.data "encryption-key" | quote }}
  {{- else }}
  encryption-key: {{ randAlphaNum 32 | b64enc | quote }}
  {{- end }}

  # ─── LLM API key ──────────────────────────────────────────────────
  {{- if .Values.secrets.llmApiKey }}
  llm-api-key: {{ .Values.secrets.llmApiKey | b64enc | quote }}
  {{- else if and $existing $existing.data (index $existing.data "llm-api-key") }}
  llm-api-key: {{ index $existing.data "llm-api-key" | quote }}
  {{- end }}

  # ─── Embedding API key ────────────────────────────────────────────
  {{- if .Values.secrets.embeddingApiKey }}
  embedding-api-key: {{ .Values.secrets.embeddingApiKey | b64enc | quote }}
  {{- else if and $existing $existing.data (index $existing.data "embedding-api-key") }}
  embedding-api-key: {{ index $existing.data "embedding-api-key" | quote }}
  {{- end }}
{{- end }}

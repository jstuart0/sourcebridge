{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "sourcebridge.fullname" . }}-secrets
  labels:
    {{- include "sourcebridge.labels" . | nindent 4 }}
  annotations:
    # Helm will not overwrite auto-generated values on upgrade
    "helm.sh/resource-policy": keep
type: Opaque
data:
  # ─── Authentication secrets ────────────────────────────────────────
  {{- if .Values.secrets.jwtSecret }}
  jwt-secret: {{ .Values.secrets.jwtSecret | b64enc | quote }}
  {{- else }}
  jwt-secret: {{ randAlphaNum 32 | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.grpcAuthSecret }}
  grpc-auth-secret: {{ .Values.secrets.grpcAuthSecret | b64enc | quote }}
  {{- else }}
  grpc-auth-secret: {{ randAlphaNum 32 | b64enc | quote }}
  {{- end }}

  # ─── SurrealDB credentials ────────────────────────────────────────
  surrealdb-user: {{ .Values.secrets.surrealdbUser | b64enc | quote }}
  {{- if .Values.secrets.surrealdbPassword }}
  surrealdb-password: {{ .Values.secrets.surrealdbPassword | b64enc | quote }}
  {{- else }}
  surrealdb-password: {{ randAlphaNum 24 | b64enc | quote }}
  {{- end }}

  # ─── Redis password (optional) ────────────────────────────────────
  {{- if .Values.secrets.redisPassword }}
  redis-password: {{ .Values.secrets.redisPassword | b64enc | quote }}
  {{- end }}

  # ─── LLM API key ──────────────────────────────────────────────────
  {{- if .Values.secrets.llmApiKey }}
  llm-api-key: {{ .Values.secrets.llmApiKey | b64enc | quote }}
  {{- end }}

  # ─── Embedding API key ────────────────────────────────────────────
  {{- if .Values.secrets.embeddingApiKey }}
  embedding-api-key: {{ .Values.secrets.embeddingApiKey | b64enc | quote }}
  {{- end }}
{{- end }}

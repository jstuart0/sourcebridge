apiVersion: v1
kind: Pod
metadata:
  name: {{ include "sourcebridge.fullname" . }}-test-connection
  labels:
    {{- include "sourcebridge.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: api-health
      image: busybox:1.36
      command:
        - sh
        - -c
        - |
          echo "Testing API health endpoint..."
          wget -qO- --timeout=5 http://{{ include "sourcebridge.fullname" . }}-api:{{ .Values.api.service.port }}/healthz
          echo ""
          echo "Testing API readiness endpoint..."
          wget -qO- --timeout=5 http://{{ include "sourcebridge.fullname" . }}-api:{{ .Values.api.service.port }}/readyz
          echo ""
          echo "Testing Web frontend..."
          wget -qO- --timeout=5 --spider http://{{ include "sourcebridge.fullname" . }}-web:{{ .Values.web.service.port }}/
          echo "All connection tests passed."

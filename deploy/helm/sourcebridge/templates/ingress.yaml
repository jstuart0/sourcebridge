{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "sourcebridge.fullname" . }}
  labels:
    {{- include "sourcebridge.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  # CA-318 / otto Medium #21: ingressClassName defaults to "traefik".
  # On clusters with multiple controllers (e.g. traefik + nginx), an empty
  # className picks the cluster default which may not be what you expect.
  # Override via ingress.className in your values file.
  ingressClassName: {{ .Values.ingress.className | default "traefik" }}
  {{- if or .Values.ingress.tls .Values.global.tls.enabled }}
  tls:
    {{- if .Values.ingress.tls }}
    {{- toYaml .Values.ingress.tls | nindent 4 }}
    {{- else if .Values.global.tls.enabled }}
    - hosts:
        - {{ .Values.global.domain }}
      {{- if .Values.global.tls.secretName }}
      secretName: {{ .Values.global.tls.secretName }}
      {{- end }}
    {{- end }}
  {{- end }}
  rules:
    - host: {{ .Values.global.domain }}
      http:
        paths:
          # API routes — order matters: more specific paths first
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "sourcebridge.fullname" . }}-api
                port:
                  number: {{ .Values.api.service.port }}
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: {{ include "sourcebridge.fullname" . }}-api
                port:
                  number: {{ .Values.api.service.port }}
          - path: /graphql
            pathType: Prefix
            backend:
              service:
                name: {{ include "sourcebridge.fullname" . }}-api
                port:
                  number: {{ .Values.api.service.port }}
          # CA-318: /healthz, /readyz, and /metrics are intentionally NOT
          # exposed via the Ingress. These are internal observability endpoints.
          # Prometheus should scrape /metrics via the in-cluster API Service
          # using a ServiceMonitor (see deploy/kubernetes/base/api-servicemonitor.yaml),
          # not through the public Ingress.
          # Catch-all — web frontend
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "sourcebridge.fullname" . }}-web
                port:
                  number: {{ .Values.web.service.port }}
{{- end }}

# Global configuration
global:
  domain: sourcebridge.example.com
  tls:
    enabled: false
    secretName: ""

# API server configuration
api:
  image:
    repository: sourcebridge/api
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 1
  port: 8080
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
  env: {}
  service:
    type: ClusterIP
    port: 8080
  nodeSelector: {}
  tolerations: []
  affinity: {}

# Web frontend configuration
web:
  image:
    repository: sourcebridge/web
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 1
  port: 3000
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  service:
    type: ClusterIP
    port: 3000
  nodeSelector: {}
  tolerations: []
  affinity: {}

# Worker configuration
worker:
  image:
    repository: sourcebridge/worker
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 1
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 2Gi
  env:
    SOURCEBRIDGE_WORKER_LLM_PROVIDER: "ollama"
    SOURCEBRIDGE_WORKER_LLM_MODEL: "qwen3:32b"
    SOURCEBRIDGE_WORKER_LLM_BASE_URL: "http://localhost:11434/v1"
    SOURCEBRIDGE_WORKER_EMBEDDING_PROVIDER: "ollama"
    SOURCEBRIDGE_WORKER_EMBEDDING_MODEL: "nomic-embed-text"
    SOURCEBRIDGE_WORKER_EMBEDDING_DIMENSION: "768"
    SOURCEBRIDGE_WORKER_EMBEDDING_BASE_URL: "http://localhost:11434"
  nodeSelector: {}
  tolerations: []
  affinity: {}

# SurrealDB configuration
surrealdb:
  enabled: true
  image:
    repository: surrealdb/surrealdb
    tag: latest
    pullPolicy: IfNotPresent
  port: 8000
  persistence:
    enabled: true
    storageClass: ""
    size: 1Gi
    accessMode: ReadWriteOnce
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi
  nodeSelector: {}
  tolerations: []
  affinity: {}

# Redis configuration
redis:
  enabled: true
  image:
    repository: redis
    tag: 7-alpine
    pullPolicy: IfNotPresent
  port: 6379
  persistence:
    enabled: true
    storageClass: ""
    size: 1Gi
    accessMode: ReadWriteOnce
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  nodeSelector: {}
  tolerations: []
  affinity: {}

# Ingress configuration
ingress:
  enabled: false
  className: traefik
  annotations: {}
  tls: []

# Secrets configuration
secrets:
  # Set to true to create secrets from values below
  create: false
  # API keys and credentials
  apiKey: ""
  surrealdbUser: "root"
  surrealdbPassword: ""
  redisPassword: ""
  llmApiKey: ""

# SourceBridge Helm Chart — values.yaml
#
# Minimal required configuration for a fresh install:
#   1. Set secrets.llmApiKey (or use Ollama for local inference)
#   2. Optionally set global.domain and ingress.enabled
#
# Secrets (jwtSecret, grpcAuthSecret, surrealdbPassword) are auto-generated
# on first install if left empty. To pin them, set explicit values.
#
# IMPORTANT — back up the encryption Secret before every helm upgrade:
#   kubectl get secret <release>-secrets -n <namespace> \
#     -o yaml > sourcebridge-secrets-backup-$(date +%Y%m%d).yaml

# -- Override the chart name
nameOverride: ""
# -- Override the full release name
fullnameOverride: ""

# Global configuration
global:
  domain: sourcebridge.example.com
  tls:
    enabled: false
    secretName: ""

# -- Top-level LLM configuration (convenience — also settable per-component via worker.env)
# These map to SOURCEBRIDGE_WORKER_LLM_* environment variables on the worker.
llm:
  # Provider: "anthropic", "openai", "ollama", "lmstudio"
  provider: anthropic
  # Model name (provider-specific)
  model: claude-sonnet-4-20250514
  # Base URL override (leave empty for cloud providers; set for Ollama/LM Studio)
  baseUrl: ""
  # CA-214: LLM base URL SSRF guard. Default true preserves current behavior
  # (Ollama on localhost is allowed). Set to false on multi-tenant public
  # deployments where users can supply LLM base URLs via the admin UI.
  allowPrivateBaseURL: true

# -- Auth configuration (CA-215)
auth:
  # Minimum admin password length. Default 8 preserves current behavior.
  # Increase to enforce a stronger floor (e.g. 12 or 16).
  passwordMinLength: 8

# -- Top-level embedding configuration
embedding:
  provider: ollama
  model: nomic-embed-text
  dimension: "768"
  baseUrl: ""

# Service accounts — CA-230: one per component, each with automountServiceAccountToken: false.
# This mirrors deploy/kubernetes/base/serviceaccounts.yaml.
serviceAccount:
  # -- Set to false to skip SA creation entirely (bring-your-own SA).
  create: true
  # -- Annotations added to every created ServiceAccount (e.g. for IRSA / Workload Identity).
  annotations: {}
  # -- Per-component SA name overrides. Auto-generated as "<release>-{api,worker,web,surrealdb}" when empty.
  # Ignored when create: false (falls back to "default" unless the override is set).
  apiName: ""
  workerName: ""
  webName: ""
  surrealdbName: ""
  # -- Legacy shared name kept for backward compatibility; no longer used by any deployment.
  name: ""

# Pod-level security context (applied to all pods)
podSecurityContext:
  fsGroup: 1000

# Container-level security context (applied to api/worker/web containers)
securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  allowPrivilegeEscalation: false
  # CA-322: when flipped to true, the deployment templates auto-render
  # writable emptyDir volume mounts for the cache paths each container
  # needs:
  #   - api:    /tmp (api.tmpSizeLimit, default 1Gi)
  #   - worker: /tmp + /var/cache/sourcebridge (worker.tmpSizeLimit
  #             default 2Gi, worker.cacheSizeLimit default 4Gi)
  #   - web:    /tmp + /app/.next/cache (web.tmpSizeLimit default 1Gi,
  #             web.nextCacheSizeLimit default 1Gi)
  # Operators with additional write paths can supply api/worker/web
  # extraVolumes + extraVolumeMounts — they are appended when this flag
  # is true and rendered alone when this flag is false.
  readOnlyRootFilesystem: false

# ─── API Server ──────────────────────────────────────────────────────
api:
  image:
    repository: ghcr.io/sourcebridge-ai/sourcebridge-api
    # Pinned to Chart.appVersion. Override for private registries:
    #   --set api.image.repository=my-registry.example.com/sourcebridge-api
    #   --set api.image.tag=0.3.0
    tag: "0.2.0"
    pullPolicy: IfNotPresent
  replicas: 1
  port: 8080
  # -- Internal listener port (loopback only). The preStop hook curls
  # this port. Must match SOURCEBRIDGE_INTERNAL_LISTEN_ADDR if you
  # override that env var. To avoid drift, do not change internalPort
  # without also setting SOURCEBRIDGE_INTERNAL_LISTEN_ADDR accordingly.
  # CA-142.
  internalPort: 8081
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
  # -- Extra environment variables (map of NAME: value)
  env: {}
  service:
    type: ClusterIP
    port: 8080
  nodeSelector: {}
  tolerations: []
  affinity: {}
  # ── Graceful drain / rolling-update settings (CA-142) ──────────────
  # terminationGracePeriodSeconds MUST be >= shutdownGraceSeconds +
  # preStopSleepSeconds + 60 (slack). Default values satisfy this:
  #   3600 + 10 + 60 = 3670 < 3900.
  # Increase shutdownGraceSeconds if you have jobs longer than 60 min.
  # Reduce if you want faster pod replacement at the cost of shorter
  # drain windows.
  terminationGracePeriodSeconds: 3900
  shutdownGraceSeconds: 3600
  preStopSleepSeconds: 10
  maxSurge: 1
  maxUnavailable: 0
  # -- PodDisruptionBudget settings
  podDisruptionBudget:
    # -- When true, creates a PDB with minAvailable=1 so voluntary
    # disruptions cannot take all API pods offline simultaneously.
    enabled: true

# ─── Web Frontend ────────────────────────────────────────────────────
web:
  image:
    repository: ghcr.io/sourcebridge-ai/sourcebridge-web
    # Pinned to Chart.appVersion. Override for private registries.
    tag: "0.2.0"
    pullPolicy: IfNotPresent
  replicas: 1
  port: 3000
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  service:
    type: ClusterIP
    port: 3000
  nodeSelector: {}
  tolerations: []
  affinity: {}

# ─── Worker (Python gRPC) ───────────────────────────────────────────
worker:
  image:
    repository: ghcr.io/sourcebridge-ai/sourcebridge-worker
    # Pinned to Chart.appVersion. Override for private registries.
    tag: "0.2.0"
    pullPolicy: IfNotPresent
  replicas: 1
  port: 50051
  resources:
    # These are starting baselines. Tune based on observed p99 usage in your
    # cluster — especially memory.limits, which scales with the number of
    # concurrent LLM calls (SOURCEBRIDGE_KNOWLEDGE_MAX_CONCURRENCY) and the
    # model context window. On tight clusters, 2Gi limits is often sufficient.
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "2"
      # Default is 2Gi — sufficient for most deployments at the default
      # SOURCEBRIDGE_KNOWLEDGE_MAX_CONCURRENCY=1.  For production workloads
      # with higher concurrency or large model context windows, override via:
      #   --set worker.resources.limits.memory=4Gi
      memory: 2Gi
  # -- Extra environment variables passed to the worker container.
  # The top-level `llm` and `embedding` sections are the recommended way
  # to configure LLM/embedding providers. Use this map only for overrides
  # or additional worker-specific settings.
  env: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  # ── Graceful drain / rolling-update settings (CA-142) ──────────────
  terminationGracePeriodSeconds: 3900
  shutdownGraceSeconds: 3600
  maxSurge: 1
  maxUnavailable: 0

# ─── SurrealDB ───────────────────────────────────────────────────────
surrealdb:
  enabled: true
  image:
    repository: surrealdb/surrealdb
    tag: v2.6.5
    pullPolicy: IfNotPresent
  port: 8000
  persistence:
    enabled: true
    storageClass: ""
    size: 5Gi
    accessMode: ReadWriteOnce
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi
  nodeSelector: {}
  tolerations: []
  affinity: {}

# ─── Redis ───────────────────────────────────────────────────────────
redis:
  enabled: true
  image:
    repository: redis
    tag: 7-alpine
    pullPolicy: IfNotPresent
  port: 6379
  persistence:
    enabled: true
    storageClass: ""
    size: 1Gi
    accessMode: ReadWriteOnce
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  nodeSelector: {}
  tolerations: []
  affinity: {}

# ─── Ingress ─────────────────────────────────────────────────────────
ingress:
  enabled: false
  # -- Ingress class name: "nginx", "traefik", or any installed controller
  className: ""
  annotations: {}
  #   # Example for nginx:
  #   nginx.ingress.kubernetes.io/proxy-body-size: "50m"
  #   # Example for traefik:
  #   traefik.ingress.kubernetes.io/router.entrypoints: websecure
  #   # Example for cert-manager:
  #   cert-manager.io/cluster-issuer: letsencrypt-production
  tls: []
  #   - hosts:
  #       - sourcebridge.example.com
  #     secretName: sourcebridge-tls

# ─── Network Policy ──────────────────────────────────────────────────
networkPolicy:
  # -- Enable NetworkPolicy hardening. Rolls out a default-deny-all policy plus
  # a curated allow-set for API, worker, web, SurrealDB, and Redis.
  # See NOTES.txt for guidance and caveats before enabling.
  # Default: false (backward-compatible; safe to enable on new installs).
  enabled: false

# ─── Secrets ─────────────────────────────────────────────────────────
secrets:
  # -- Set to true to have the chart create a Secret resource.
  # When false, you must create the secret manually or use an external
  # secret manager (e.g. External Secrets Operator, Vault).
  create: true

  # -- JWT signing secret for API authentication.
  # Auto-generated (32 chars) on first install if left empty.
  jwtSecret: ""

  # -- Shared secret for API <-> Worker gRPC authentication.
  # Auto-generated (32 chars) on first install if left empty.
  grpcAuthSecret: ""

  # -- SurrealDB root credentials.
  surrealdbUser: "root"
  # Auto-generated (24 chars) on first install if left empty.
  surrealdbPassword: ""

  # -- Redis password (optional — left empty means no auth).
  redisPassword: ""

  # -- Encryption key for LLM API keys and git tokens stored in the database.
  # Auto-generated (32 alphanumeric chars) on first install if left empty.
  # helm.sh/resource-policy: keep ensures helm upgrade does NOT regenerate this.
  # Losing this key means re-entering all encrypted secrets via the admin UI.
  # Generate a custom key with: openssl rand -hex 32
  # Format: 32+ bytes of cryptographic random, hex- or base64-encoded.
  encryptionKey: ""

  # -- LLM API key (e.g. Anthropic, OpenAI).
  # Required when llm.provider is a cloud provider.
  # Not needed for Ollama or other local providers.
  llmApiKey: ""

  # -- Embedding API key (e.g. Voyage AI).
  embeddingApiKey: ""

# Role in sourcebridge namespace: allows rollout restart of deployments
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tekton-deploy-role
  namespace: sourcebridge
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "patch", "update"]
---
# Bind tekton-build-sa to deployment role in sourcebridge namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tekton-deploy-binding
  namespace: sourcebridge
subjects:
  - kind: ServiceAccount
    name: tekton-build-sa
    namespace: tekton-builds
roleRef:
  kind: Role
  name: tekton-deploy-role
  apiGroup: rbac.authorization.k8s.io

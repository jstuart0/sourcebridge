version: v2
plugins:
  - remote: buf.build/protocolbuffers/go
    out: ../gen/go
    opt: paths=source_relative
  - remote: buf.build/grpc/go
    out: ../gen/go
    opt: paths=source_relative
  # Python stubs are generated via grpc_tools.protoc (see Makefile proto target)
  # to ensure version compatibility with the installed protobuf runtime.

syntax = "proto3";

package sourcebridge.enterprise.v1;

option go_package = "github.com/sourcebridge/sourcebridge/gen/go/enterprise/v1;enterprisev1";

import "common/v1/types.proto";
import "common/v1/knowledge_progress.proto";

// EnterpriseReportService hosts enterprise-only report generation RPCs.
//
// GenerateReport is server-streaming (CA-122). The report engine
// already exposes a fine-grained progress callback internally
// (workers/reports/engine.py); the streaming refactor surfaces those
// fractions to the orchestrator as KnowledgeStreamProgress events with
// unit_kind="report_progress" so the GraphQL UI shows real progress
// instead of a synthetic time-based curve. See thoughts/shared/plans/
// 2026-04-29-deep-cliffnotes-deadline-exceeded.md (Decision 4b).
service EnterpriseReportService {
  rpc GenerateReport(GenerateReportRequest) returns (stream GenerateReportStreamMessage);
}

// GenerateReportStreamMessage envelopes the GenerateReport server
// stream. Exactly one of {phase, progress, final} is set per message.
message GenerateReportStreamMessage {
  oneof event {
    sourcebridge.common.v1.KnowledgeStreamPhaseMarker phase = 1;
    sourcebridge.common.v1.KnowledgeStreamProgress progress = 2;
    GenerateReportResponse final = 3;
  }
}

message GenerateReportRequest {
  string report_id = 1;
  string report_name = 2;
  string report_type = 3;        // "architecture_baseline", "swot", etc.
  string audience = 4;           // "c_suite", "developer", etc.
  repeated string repository_ids = 5;
  repeated string selected_sections = 6;
  bool include_diagrams = 7;
  string loe_mode = 8;           // "human_hours" | "ai_assisted"
  string output_dir = 9;         // where to write output files
  string repo_data_json = 10;    // JSON-serialized repo data (cliff notes, scores, metadata)
  string section_definitions_json = 11; // JSON-serialized section definitions from Go
  string model_override = 12;    // Optional model override for report generation
  string analysis_depth = 13;    // "standard" or "deep"
  bool include_recommendations = 14; // Whether to include recommendations in sections
  bool include_loe = 15;             // Whether to include LOE estimates
  string style_system_prompt = 16;   // Custom system prompt from selected style
  string style_section_rules = 17;   // Custom section rules from selected style
}

message GenerateReportResponse {
  string markdown = 1;           // full assembled markdown
  int32 section_count = 2;
  int32 word_count = 3;
  int32 evidence_count = 4;
  string content_dir = 5;
  repeated ReportSectionResult sections = 6;
  sourcebridge.common.v1.LLMUsage usage = 7;
  string evidence_json = 8;      // JSON-serialized evidence items generated by the worker
}

message ReportSectionResult {
  string key = 1;
  string title = 2;
  string category = 3;
  string status = 4;             // "completed" | "failed"
  int32 word_count = 5;
  int32 duration_ms = 6;
  string error_message = 7;
}

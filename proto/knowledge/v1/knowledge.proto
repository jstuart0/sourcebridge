syntax = "proto3";

package sourcebridge.knowledge.v1;

option go_package = "github.com/sourcebridge/sourcebridge/gen/go/knowledge/v1;knowledgev1";

import "common/v1/types.proto";
import "common/v1/knowledge_progress.proto";

// KnowledgeService handles LLM-powered codebase knowledge generation.
//
// All seven RPCs are server-streaming (CA-122). Each method emits a
// stream of *StreamMessage values whose oneof carries one of:
//   * phase   -- a KnowledgeStreamPhaseMarker emitted at every phase
//                transition so the client can deterministically update
//                the user-facing phase label.
//   * progress -- a KnowledgeStreamProgress heartbeat carrying RUN-TIME
//                 (completed_units/total_units) counters and an
//                 optional human-readable message. Emitted on a
//                 periodic cadence (default 30s) within a phase.
//   * final    -- the terminal payload carrying the response body. Last
//                 message on the stream. Exactly one final message is
//                 emitted per successful call; absence of a final
//                 message before EOF is an error.
//
// The streaming shape replaces the prior unary methods because
// repository-scoped knowledge generation (especially deep cliff notes)
// is inherently a multi-phase incrementally-producing operation. The
// per-call wall-clock deadline that bounded the unary calls is replaced
// by an outer safety-net deadline (operator-tunable, default 4h) plus
// gRPC keepalive on the channel, plus a 10-min reaper that actively
// cancels stuck runs. See thoughts/shared/plans/2026-04-29-deep-cliffnotes-deadline-exceeded.md.
service KnowledgeService {
  // GenerateCliffNotes produces a structured cliff-notes report for a repository.
  rpc GenerateCliffNotes(GenerateCliffNotesRequest) returns (stream GenerateCliffNotesStreamMessage);

  // GenerateLearningPath produces a guided learning path for a repository.
  rpc GenerateLearningPath(GenerateLearningPathRequest) returns (stream GenerateLearningPathStreamMessage);

  // GenerateArchitectureDiagram produces an AI-authored Mermaid architecture diagram.
  rpc GenerateArchitectureDiagram(GenerateArchitectureDiagramRequest) returns (stream GenerateArchitectureDiagramStreamMessage);

  // GenerateWorkflowStory produces a grounded narrative for how a workflow is used.
  rpc GenerateWorkflowStory(GenerateWorkflowStoryRequest) returns (stream GenerateWorkflowStoryStreamMessage);

  // ExplainSystem produces a transient whole-system explanation.
  rpc ExplainSystem(ExplainSystemRequest) returns (stream ExplainSystemStreamMessage);

  // GenerateCodeTour produces a guided code tour for a repository.
  rpc GenerateCodeTour(GenerateCodeTourRequest) returns (stream GenerateCodeTourStreamMessage);
}

// GenerateCliffNotesStreamMessage is the per-message envelope on the
// GenerateCliffNotes server stream. Exactly one of {phase, progress,
// final} is set per message.
message GenerateCliffNotesStreamMessage {
  oneof event {
    sourcebridge.common.v1.KnowledgeStreamPhaseMarker phase = 1;
    sourcebridge.common.v1.KnowledgeStreamProgress progress = 2;
    GenerateCliffNotesResponse final = 3;
  }
}

// GenerateLearningPathStreamMessage envelopes the GenerateLearningPath
// server stream.
message GenerateLearningPathStreamMessage {
  oneof event {
    sourcebridge.common.v1.KnowledgeStreamPhaseMarker phase = 1;
    sourcebridge.common.v1.KnowledgeStreamProgress progress = 2;
    GenerateLearningPathResponse final = 3;
  }
}

// GenerateArchitectureDiagramStreamMessage envelopes the
// GenerateArchitectureDiagram server stream.
message GenerateArchitectureDiagramStreamMessage {
  oneof event {
    sourcebridge.common.v1.KnowledgeStreamPhaseMarker phase = 1;
    sourcebridge.common.v1.KnowledgeStreamProgress progress = 2;
    GenerateArchitectureDiagramResponse final = 3;
  }
}

// GenerateWorkflowStoryStreamMessage envelopes the GenerateWorkflowStory
// server stream.
message GenerateWorkflowStoryStreamMessage {
  oneof event {
    sourcebridge.common.v1.KnowledgeStreamPhaseMarker phase = 1;
    sourcebridge.common.v1.KnowledgeStreamProgress progress = 2;
    GenerateWorkflowStoryResponse final = 3;
  }
}

// ExplainSystemStreamMessage envelopes the ExplainSystem server stream.
message ExplainSystemStreamMessage {
  oneof event {
    sourcebridge.common.v1.KnowledgeStreamPhaseMarker phase = 1;
    sourcebridge.common.v1.KnowledgeStreamProgress progress = 2;
    ExplainSystemResponse final = 3;
  }
}

// GenerateCodeTourStreamMessage envelopes the GenerateCodeTour server
// stream.
message GenerateCodeTourStreamMessage {
  oneof event {
    sourcebridge.common.v1.KnowledgeStreamPhaseMarker phase = 1;
    sourcebridge.common.v1.KnowledgeStreamProgress progress = 2;
    GenerateCodeTourResponse final = 3;
  }
}

enum Audience {
  AUDIENCE_UNSPECIFIED = 0;
  AUDIENCE_BEGINNER = 1;
  AUDIENCE_DEVELOPER = 2;
}

enum Depth {
  DEPTH_UNSPECIFIED = 0;
  DEPTH_SUMMARY = 1;
  DEPTH_MEDIUM = 2;
  DEPTH_DEEP = 3;
}

// GenerateCliffNotesRequest carries the assembled repository snapshot for the
// Python worker to synthesize into cliff notes. The Go API side assembles the
// snapshot from the graph store and serializes it as JSON.
message GenerateCliffNotesRequest {
  string repository_id = 1;
  string repository_name = 2;
  string audience = 3;       // "beginner" or "developer"
  string depth = 4;          // "summary", "medium", or "deep"
  string snapshot_json = 5;  // JSON-serialized KnowledgeSnapshot
  string scope_type = 6;     // "repository", "module", "file", "symbol"
  string scope_path = 7;     // canonical scope path
  Audience audience_enum = 8;
  Depth depth_enum = 9;
}

message GenerateCliffNotesResponse {
  repeated KnowledgeSection sections = 1;
  sourcebridge.common.v1.LLMUsage usage = 2;
  CliffNotesDiagnostics diagnostics = 3;
}

message GenerateArchitectureDiagramRequest {
  string repository_id = 1;
  string repository_name = 2;
  string audience = 3;
  string depth = 4;
  string snapshot_json = 5;
  string deterministic_diagram_json = 6; // JSON-serialized deterministic diagram scaffold
  Audience audience_enum = 7;
  Depth depth_enum = 8;
}

message GenerateArchitectureDiagramResponse {
  string mermaid_source = 1;
  string raw_mermaid_source = 2;
  string validation_status = 3; // "valid", "repaired", "invalid"
  string repair_summary = 4;
  string diagram_summary = 5;
  repeated KnowledgeEvidence evidence = 6;
  repeated string inferred_edges = 7;
  sourcebridge.common.v1.LLMUsage usage = 8;
  string detail_mermaid_source = 9;
  string detail_raw_mermaid_source = 10;
  string detail_validation_status = 11;
  string detail_repair_summary = 12;
  string detail_diagram_summary = 13;
  string detail_subsystem_name = 14;
  repeated string detail_candidate_subsystems = 15;
  repeated KnowledgeEvidence detail_evidence = 16;
}

message CliffNotesDiagnostics {
  int32 cached_nodes = 1;
  int32 fallback_count = 2;
  int32 provider_compute_errors = 3;
  int32 leaf_cache_hits = 4;
  int32 file_cache_hits = 5;
  int32 package_cache_hits = 6;
  int32 root_cache_hits = 7;
  int32 total_nodes = 8;
  string corpus_id = 9;
  string revision_fp = 10;
  string strategy = 11;
  string model_used = 12;
}

// GenerateLearningPathRequest carries the snapshot for learning path generation.
message GenerateLearningPathRequest {
  string repository_id = 1;
  string repository_name = 2;
  string audience = 3;
  string depth = 4;
  string snapshot_json = 5;
  string focus_area = 6;     // optional area to focus the learning path on
  Audience audience_enum = 7;
  Depth depth_enum = 8;
}

message GenerateLearningPathResponse {
  repeated LearningStep steps = 1;
  sourcebridge.common.v1.LLMUsage usage = 2;
}

message GenerateWorkflowStoryRequest {
  string repository_id = 1;
  string repository_name = 2;
  string audience = 3;
  string depth = 4;
  string snapshot_json = 5;
  string scope_type = 6;          // "repository", "module", "file", "symbol"
  string scope_path = 7;          // canonical scope path
  string anchor_label = 8;        // optional plain-language anchor for the story
  string execution_path_json = 9; // optional JSON-serialized execution steps
  Audience audience_enum = 10;
  Depth depth_enum = 11;
}

message GenerateWorkflowStoryResponse {
  repeated KnowledgeSection sections = 1;
  sourcebridge.common.v1.LLMUsage usage = 2;
}

message LearningStep {
  int32 order = 1;
  string title = 2;
  string objective = 3;
  string content = 4;         // markdown
  repeated string file_paths = 5;
  repeated string symbol_ids = 6;
  string estimated_time = 7;  // e.g. "15 minutes"
  repeated int32 prerequisite_steps = 8;
  string difficulty = 9;
  repeated string exercises = 10;
  string checkpoint = 11;
  string confidence = 12;
  string refinement_status = 13;
}

// ExplainSystemRequest carries the snapshot for transient whole-system explanation.
message ExplainSystemRequest {
  string repository_id = 1;
  string repository_name = 2;
  string audience = 3;
  string question = 4;        // optional focusing question
  string snapshot_json = 5;
  string scope_type = 6;      // "repository", "module", "file", "symbol"
  string scope_path = 7;      // canonical scope path
  string depth = 8;           // "summary", "medium", "deep"
}

message ExplainSystemResponse {
  string explanation = 1;      // markdown
  repeated KnowledgeEvidence evidence = 2;
  sourcebridge.common.v1.LLMUsage usage = 3;
}

// GenerateCodeTourRequest carries the snapshot for code tour generation.
message GenerateCodeTourRequest {
  string repository_id = 1;
  string repository_name = 2;
  string audience = 3;
  string depth = 4;
  string snapshot_json = 5;
  string theme = 6;            // optional theme/focus for the tour
  Audience audience_enum = 7;
  Depth depth_enum = 8;
}

message GenerateCodeTourResponse {
  repeated CodeTourStop stops = 1;
  sourcebridge.common.v1.LLMUsage usage = 2;
}

message CodeTourStop {
  int32 order = 1;
  string title = 2;
  string description = 3;      // markdown
  string file_path = 4;
  int32 line_start = 5;
  int32 line_end = 6;
  string trail = 7;
  repeated string modification_hints = 8;
  string confidence = 9;
  string refinement_status = 10;
}

// KnowledgeSection is a structured section of a knowledge artifact.
message KnowledgeSection {
  string title = 1;
  string content = 2;          // markdown body
  string summary = 3;          // one-line summary
  string confidence = 4;       // "high", "medium", "low"
  bool inferred = 5;           // true if LLM-inferred rather than directly evidenced
  repeated KnowledgeEvidence evidence = 6;
  string refinement_status = 7;
}

// KnowledgeEvidence links a knowledge section to a source artifact.
message KnowledgeEvidence {
  string source_type = 1;      // "file", "symbol", "requirement", "doc"
  string source_id = 2;
  string file_path = 3;
  int32 line_start = 4;
  int32 line_end = 5;
  string rationale = 6;
}

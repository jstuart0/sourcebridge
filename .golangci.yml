version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    # gosimple was merged into staticcheck in golangci-lint v2; dropped from explicit list
  settings:
    errcheck:
      # Ignore unchecked errors from HTTP response writers (rarely fail, noisy to check)
      exclude-functions:
        - (net/http.ResponseWriter).Write
        - (*encoding/json.Encoder).Encode
        - (*encoding/csv.Writer).Write
        - io.WriteString
    staticcheck:
      checks: ["all", "-SA1019"]  # Suppress deprecation warnings for now
  exclusions:
    rules:
      # Test files: relax errcheck — test helpers often ignore setup errors
      - path: _test\.go
        linters:
          - errcheck
    paths:
      - gen
      - tests/fixtures
      - node_modules

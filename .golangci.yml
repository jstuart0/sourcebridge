version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    # gosimple was merged into staticcheck in golangci-lint v2; dropped from explicit list
  settings:
    errcheck:
      # Ignore unchecked errors from HTTP response writers (rarely fail, noisy to check)
      exclude-functions:
        - (net/http.ResponseWriter).Write
        - (*encoding/json.Encoder).Encode
        - (*encoding/csv.Writer).Write
        - io.WriteString
    staticcheck:
      # SA-class only — matches v1 staticcheck effective behavior.
      # ST* (doc comment style), QF* (code suggestions), S* (gosimple) are
      # pre-existing debt surfaced by the v2 linter unification; tracked as a
      # follow-up cleanup ticket. SA1019 (deprecation) suppressed as before.
      checks: ["SA*", "-SA1019"]
  exclusions:
    rules:
      # Test files: relax errcheck — test helpers often ignore setup errors
      - path: _test\.go
        linters:
          - errcheck
      # defer X.Close() — pre-existing pattern throughout the codebase; noisy
      # in v2 errcheck. Tracked for cleanup in a follow-up CA ticket.
      - linters: [errcheck]
        text: "Error return value of `.*\\.Close` is not checked"
      # fmt.Fprint / fmt.Fprintf / fmt.Fprintln to stdout/stderr — low-risk,
      # pre-existing pattern.
      - linters: [errcheck]
        text: "Error return value of `fmt\\.(Fprint|Fprintln|Fprintf)` is not checked"
      # os.Stdout / os.Stderr / *os.File Write calls — pre-existing, low-risk.
      - linters: [errcheck]
        text: "Error return value of `.*\\.(Write|Flush)` is not checked"
      # resp.Body.Close — standard HTTP client pattern; pre-existing.
      - linters: [errcheck]
        text: "Error return value of `.*Body\\.Close` is not checked"
    paths:
      - gen
      - tests/fixtures
      - node_modules
